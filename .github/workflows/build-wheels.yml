name: build-wheels

# Reusable wheel-build matrix ‚Äî the SINGLE source of truth for how every
# ciris-server abi3 wheel is built. Called by:
#   ‚Ä¢ publish-pypi.yml  (on a v* tag)        ‚Üí builds + uploads, then gated + published
#   ‚Ä¢ warm-release-cache.yml (on main, gated) ‚Üí builds to WARM the release cache
#
# Why one shared workflow: the warmer and the release MUST build byte-identically
# or the cache they share never hits. Keeping the steps in one place guarantees
# that ‚Äî there is no second copy to drift.
#
# Cache model (two tiers):
#   ‚Ä¢ Swatinem rust-cache (GHA L1) ‚Äî GitHub scopes GHA caches by ref, and a tag
#     run can only READ the default branch's caches, so it SAVES only on main
#     (`save-if: main`) and restores everywhere.
#   ‚Ä¢ CIRISCache (GHCR L2, restore@v2) ‚Äî a GHCR package is NOT ref-scoped, so the
#     SERVER `-s<version>` blob is saved on main AND on the v* tag publish (this
#     workflow's only caller now that warm-release-cache is retired). That keeps a
#     per-version `-s` blob so the next release's restore@v2 `-s*` prefix fallback
#     pulls the latest lean ~1 GB server blob instead of the larger edge layer.
# The maturin-action legs (macOS/Windows) use the action's built-in `sccache`.

on:
  workflow_call:

permissions:
  contents: read
  packages: write   # CIRISCache save (GHCR) on main ‚Äî CIRISServer#99

jobs:
  # ‚îÄ‚îÄ Build abi3 wheels per platform ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Linux: build on the native runners with apt deps + patchelf (NOT a manylinux
  # container). The keyring's tss-esapi-sys needs tpm2-tss >= 3.x; the
  # manylinux_2_28/el8 container only ships 2.3.2 ‚Üí "tss2-sys not found". Ubuntu
  # 24.04 has 4.0.x, and maturin+patchelf produce a manylinux_2_39 wheel ‚Äî the
  # same recipe the sister wheels ship (persist manylinux_2_38, edge _2_39) and
  # the one the green conformance build-wheel job uses.
  linux:
    name: wheel ${{ matrix.plat.name }}
    runs-on: ${{ matrix.plat.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        plat:
          - { name: linux-x86_64, runs-on: ubuntu-latest }
          - { name: linux-aarch64, runs-on: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Restore the release substrate compile (warmed on main with the matching
      # shared-key). Saves only on main; on a tag this is restore-only (a tag-
      # scoped save can't be read by the next tag, so it would just burn budget).
      # linux-x86_64 also shares the key conformance.yml warms on every push.
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          shared-key: release-${{ matrix.plat.name }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # CIRISCache (CIRISServer#99) ‚Äî 4-layer centipede over the Swatinem GHA L1.
      # Restore widest‚Üínarrowest (verify‚Üípersist‚Üíedge‚Üíserver); SAVE under the
      # server-specific -s key so we never collide with edge's canonical blob.
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT="${{ matrix.plat.name }}"
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
            echo "key-server-prefix=${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      # Deepest-first, first-hit-wins (CIRISCache restore@v2): one extraction of
      # the deepest available blob (cumulative supersets) instead of N redundant.
      - name: CIRISCache restore (server‚Üíedge‚Üípersist‚Üíverify, first hit)
        uses: CIRISAI/CIRISCache/restore@v2
        continue-on-error: true
        with:
          keys: |
            ${{ steps.cachekey.outputs.key }}
            ${{ steps.cachekey.outputs.key-server-prefix }}*
            ${{ steps.cachekey.outputs.key-edge }}
            ${{ steps.cachekey.outputs.key-persist }}
            ${{ steps.cachekey.outputs.key-verify }}
      - name: Install build deps
        run: |
          # Drop the preinstalled Microsoft/azure-cli apt repo: it intermittently
          # 403s and tanks apt-get update (its packages are not needed here).
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libudev-dev patchelf
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ‚îÄ‚îÄ Build + stage the per-platform desktop JAR BEFORE maturin ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # The Compose uber-jar is named CIRIS-<platform>-<ver>.jar by the gradle
      # plugin (e.g. CIRIS-linux-x64-2.6.0.jar). maturin then bundles it into
      # the wheel via [tool.maturin] include (see pyproject.toml). System Java
      # only ‚Äî no JRE is bundled, keeping each wheel under PyPI's 100 MB cap.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build + stage desktop JAR
        working-directory: client
        run: |
          chmod +x ./gradlew
          # Keep the desktop client's CLIENT_VERSION in lockstep with the release
          # version (Cargo.toml) so the node-vs-client "update recommended" banner
          # never false-fires on a wheel-bundled local node.
          CV=$(grep -m1 '^version = ' ../Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          CVF=shared/src/commonMain/kotlin/ai/ciris/mobile/shared/models/ClientMode.kt
          # portable in-place edit (GNU + BSD/macOS sed both accept -i.bak)
          sed -i.bak "s/const val CLIENT_VERSION = \"[^\"]*\"/const val CLIENT_VERSION = \"$CV\"/" "$CVF"
          rm -f "$CVF.bak"
          echo "synced CLIENT_VERSION -> $CV"
          ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
          mkdir -p ../python/ciris_server/desktop_app
          cp desktopApp/build/compose/jars/CIRIS-*.jar ../python/ciris_server/desktop_app/
          ls -l ../python/ciris_server/desktop_app/
      - name: Build wheel (maturin)
        run: |
          python -m pip install --upgrade pip
          pip install "maturin>=1.7,<2"
          maturin build --release --strip --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.plat.name }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1
      # Populate the cross-repo CIRISCache blob on main under the SERVER key
      # (restore is anonymous on PRs; only main writes ‚Äî public package,
      # GITHUB_TOKEN, no external secret).
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: wheel macos-${{ matrix.target }}
    runs-on: macos-14
    # KNOWN LIMITATION (macos x86_64 leg): the macos-14 runner is Apple Silicon,
    # so `packageUberJarForCurrentOS` produces the arm64 macOS JAR for BOTH
    # matrix legs. The x86_64 *wheel* (the Rust .so) is a proper cross-compile,
    # but it carries the arm64 desktop JAR. Compose JARs are not single-arch JVM
    # bytecode for the app classes, but the Compose/Skiko *native* libs inside
    # are per-arch ‚Äî so an Intel-mac user installing the x86_64 wheel may hit a
    # Skiko load error. To ship a true Intel JAR, add a macos-13 (Intel) runner
    # leg, or `gradlew packageUberJarForCurrentOS` under an x86_64 JDK. Left as a
    # follow-up; arm64 (the common case) is correct.
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # The Compose plugin packages a current-OS uber-jar; on the macos-14
      # runner that is the macOS JAR (CIRIS-macos-<arch>-<ver>.jar). The arch
      # follows the runner/JDK, so the aarch64 + x86_64 matrix legs each stage
      # the JAR matching their wheel target. maturin bundles it via include.
      - name: Build + stage desktop JAR
        working-directory: client
        run: |
          chmod +x ./gradlew
          # Keep the desktop client's CLIENT_VERSION in lockstep with the release
          # version (Cargo.toml) so the node-vs-client "update recommended" banner
          # never false-fires on a wheel-bundled local node.
          CV=$(grep -m1 '^version = ' ../Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          CVF=shared/src/commonMain/kotlin/ai/ciris/mobile/shared/models/ClientMode.kt
          # portable in-place edit (GNU + BSD/macOS sed both accept -i.bak)
          sed -i.bak "s/const val CLIENT_VERSION = \"[^\"]*\"/const val CLIENT_VERSION = \"$CV\"/" "$CVF"
          rm -f "$CVF.bak"
          echo "synced CLIENT_VERSION -> $CV"
          ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
          mkdir -p ../python/ciris_server/desktop_app
          cp desktopApp/build/compose/jars/CIRIS-*.jar ../python/ciris_server/desktop_app/
          ls -l ../python/ciris_server/desktop_app/
      # CIRISCache (CIRISServer#99) ‚Äî 4-layer centipede, layered over
      # maturin-action's sccache below. Restore verify‚Üípersist‚Üíedge‚Üíserver;
      # SAVE under the server-specific -s key.
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT="macos-${{ matrix.target }}"
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
            echo "key-server-prefix=${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      # Deepest-first, first-hit-wins (CIRISCache restore@v2): one extraction of
      # the deepest available blob (cumulative supersets) instead of N redundant.
      - name: CIRISCache restore (server‚Üíedge‚Üípersist‚Üíverify, first hit)
        uses: CIRISAI/CIRISCache/restore@v2
        continue-on-error: true
        with:
          keys: |
            ${{ steps.cachekey.outputs.key }}
            ${{ steps.cachekey.outputs.key-server-prefix }}*
            ${{ steps.cachekey.outputs.key-edge }}
            ${{ steps.cachekey.outputs.key-persist }}
            ${{ steps.cachekey.outputs.key-verify }}
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          # maturin-action's built-in compiler cache (sccache over the GHA cache
          # backend), warmed on main by warm-release-cache.yml calling this same
          # workflow. Restores main-scoped sccache objects on a tag publish.
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1
      # Populate the cross-repo CIRISCache blob on main under the SERVER key.
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: wheel windows-x64
    runs-on: windows-latest
    # The family's Windows wheel has historically failed on persist's Unix-only
    # paths (CIRISPersist#200 / CIRISEdge#90). Don't block the release on it;
    # publish whatever platforms succeed. Remove continue-on-error once green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build + stage desktop JAR
        working-directory: client
        shell: bash
        run: |
          # Keep the desktop client's CLIENT_VERSION in lockstep with the release
          # version (Cargo.toml) so the node-vs-client "update recommended" banner
          # never false-fires on a wheel-bundled local node.
          CV=$(grep -m1 '^version = ' ../Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          CVF=shared/src/commonMain/kotlin/ai/ciris/mobile/shared/models/ClientMode.kt
          # portable in-place edit (GNU + BSD/macOS sed both accept -i.bak)
          sed -i.bak "s/const val CLIENT_VERSION = \"[^\"]*\"/const val CLIENT_VERSION = \"$CV\"/" "$CVF"
          rm -f "$CVF.bak"
          echo "synced CLIENT_VERSION -> $CV"
          ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
          mkdir -p ../python/ciris_server/desktop_app
          cp desktopApp/build/compose/jars/CIRIS-*.jar ../python/ciris_server/desktop_app/
          ls -l ../python/ciris_server/desktop_app/
      # CIRISCache (CIRISServer#99) ‚Äî 4-layer centipede, layered over
      # maturin-action's sccache below. shell: bash (default is pwsh). Restore
      # verify‚Üípersist‚Üíedge‚Üíserver; SAVE under the server-specific -s key.
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT="windows-x64"
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
            echo "key-server-prefix=${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      # Deepest-first, first-hit-wins (CIRISCache restore@v2): one extraction of
      # the deepest available blob (cumulative supersets) instead of N redundant.
      - name: CIRISCache restore (server‚Üíedge‚Üípersist‚Üíverify, first hit)
        uses: CIRISAI/CIRISCache/restore@v2
        continue-on-error: true
        with:
          keys: |
            ${{ steps.cachekey.outputs.key }}
            ${{ steps.cachekey.outputs.key-server-prefix }}*
            ${{ steps.cachekey.outputs.key-edge }}
            ${{ steps.cachekey.outputs.key-persist }}
            ${{ steps.cachekey.outputs.key-verify }}
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --strip --out dist
          # Compiler cache (sccache over the GHA backend), warmed on main via
          # warm-release-cache.yml. Restore-on-tag; harmless otherwise.
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist/*.whl
          if-no-files-found: warn
          retention-days: 1
      # Populate the cross-repo CIRISCache blob on main under the SERVER key.
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Android abi3 wheels (incl. arm32 armeabi-v7a) ‚Äî the CIRISAgent KMP client's
  # mobile targets. NDK cross-compile + libpython stub, the substrate recipe
  # (CIRISVerify/Persist/Edge). continue-on-error while the cross lane iterates
  # to green ‚Äî it must not block the desktop/server publish.
  android:
    name: wheel android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    # Green as of 0.2.1 (arm64-v8a + armeabi-v7a both package). A required gate now.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { abi: armeabi-v7a, target: armv7-linux-androideabi, clang: armv7a-linux-androideabi24, legacy: arm-linux-androideabi,  pw: 32 }
          - { abi: arm64-v8a,   target: aarch64-linux-android,   clang: aarch64-linux-android24,    legacy: aarch64-linux-android, pw: 64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Cache the NDK cross-compile of the substrate per-ABI (the target-specific
      # CC/linker env is exported in the build step AFTER this, so it never
      # pollutes the cache key ‚Äî warmer and publish share cleanly). Saves on main
      # (warm-release-cache), restores on a tag publish.
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          shared-key: release-android-${{ matrix.abi }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # CIRISCache (CIRISServer#99) ‚Äî 4-layer centipede over the Swatinem GHA L1,
      # per-ABI NDK cross-compile of the substrate. Restore verify‚Üípersist‚Üíedge‚Üí
      # server; SAVE under the server-specific -s key.
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT="android-${{ matrix.abi }}"
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
            echo "key-server-prefix=${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      # Deepest-first, first-hit-wins (CIRISCache restore@v2): one extraction of
      # the deepest available blob (cumulative supersets) instead of N redundant.
      - name: CIRISCache restore (server‚Üíedge‚Üípersist‚Üíverify, first hit)
        uses: CIRISAI/CIRISCache/restore@v2
        continue-on-error: true
        with:
          keys: |
            ${{ steps.cachekey.outputs.key }}
            ${{ steps.cachekey.outputs.key-server-prefix }}*
            ${{ steps.cachekey.outputs.key-edge }}
            ${{ steps.cachekey.outputs.key-persist }}
            ${{ steps.cachekey.outputs.key-verify }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26b
          add-to-path: true
      - name: PyO3 cross config + libpython stub
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          CFG="${RUNNER_TEMP}/pyo3-android.config"
          {
            echo "implementation=CPython"; echo "version=3.10"; echo "shared=false"
            echo "abi3=true"; echo "lib_name=python3.10"; echo "lib_dir="
            echo "executable="; echo "pointer_width=${{ matrix.pw }}"; echo "build_flags="
            echo "suppress_build_script_link_lines=true"
          } > "$CFG"
          echo "PYO3_CONFIG_FILE=${CFG}" >> "$GITHUB_ENV"
          STUB="${RUNNER_TEMP}/python-stub"; mkdir -p "$STUB"
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          echo 'void __pystub(void){}' | \
            "${TC}/bin/${{ matrix.clang }}-clang" -shared -nostdlib \
              -Wl,-soname,libpython3.10.so -o "${STUB}/libpython3.10.so" -x c -
      - name: Build wheel (maturin, Android NDK)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_API_LEVEL: "24" # maturin can't infer the API level for armv7 (it can for arm64)
        run: |
          # cc-rs guesses the wrong NDK clang name (arm-linux-androideabi-clang);
          # point CC/CXX/AR + the cargo linker at the real r26b tools (what
          # cargo-ndk would set). Var names use the underscore/SCREAMING target.
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CLANG="${TC}/${{ matrix.clang }}-clang"
          TUS="$(echo '${{ matrix.target }}' | tr - _)"
          TSC="$(echo "$TUS" | tr a-z A-Z)"
          export "CC_${TUS}=${CLANG}"
          export "CXX_${TUS}=${CLANG}++"
          export "AR_${TUS}=${TC}/llvm-ar"
          export "RANLIB_${TUS}=${TC}/llvm-ranlib"
          export "CARGO_TARGET_${TSC}_LINKER=${CLANG}"
          # openssl-src (pulled by persist on android) hardcodes the LEGACY NDK
          # tool names that r26b dropped; shim them ‚Üí the r26b llvm tools.
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          ln -sf "${TC}/llvm-ar"     "${TC}/${{ matrix.legacy }}-ar"
          ln -sf "${TC}/llvm-ranlib" "${TC}/${{ matrix.legacy }}-ranlib"
          ln -sf "${CLANG}"          "${TC}/${{ matrix.legacy }}-clang"
          ln -sf "${CLANG}++"        "${TC}/${{ matrix.legacy }}-clang++"
          export PATH="${TC}:${PATH}"
          export RUSTFLAGS="-L ${RUNNER_TEMP}/python-stub -C link-arg=-Wl,--no-as-needed -C link-arg=-lpython3.10"
          python -m pip install --upgrade pip
          pip install "maturin>=1.7,<2"
          maturin build --release --strip --out dist --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-android-${{ matrix.abi }}
          path: dist/*.whl
          if-no-files-found: warn
          retention-days: 1
      # Populate the cross-repo CIRISCache blob on main under the SERVER key.
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1
