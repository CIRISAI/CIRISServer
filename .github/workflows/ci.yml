name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write   # CIRISCache save (GHCR) on main — CIRISServer#99

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        # libtss2-dev: the Linux-only keyring/tpm backend (cfg(target_os=linux)).
        # libsqlite3-dev: persist's sqlite. macOS/Windows pull NEITHER tss-esapi
        # nor openssl (postgres+tpm are Linux-only per Cargo.toml [target.linux]).
        run: |
          # Drop the preinstalled Microsoft/azure-cli apt repo: it intermittently
          # 403s and tanks apt-get update (its packages are not needed here).
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libudev-dev
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      # CIRISCache (CIRISServer#99) — 4-layer centipede over the Swatinem GHA L1.
      # PLAT from the NATIVE target of each runner (macos-latest = arm64). Restore
      # verify→persist→edge→server; SAVE under the server-specific -s key on main.
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)  PLAT=linux-x86_64 ;;
            macos-latest)   PLAT=macos-aarch64 ;;
            windows-latest) PLAT=windows-x64 ;;
            *)              PLAT=unknown ;;
          esac
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      - name: CIRISCache restore (verify layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-verify }}
      - name: CIRISCache restore (persist layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-persist }}
      - name: CIRISCache restore (edge layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-edge }}
      - name: CIRISCache restore (server layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
      # Default features build everywhere (sqlite + the binary path); postgres +
      # tpm are Linux-only (per-target). NOT --all-features: that drags
      # `extension-module` (libpython-no-link) into the test binary.
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # The NOISE FLOOR proof (CIRISServer#14, CEG §19.7 / §19.3 N5) — provable
      # individual-unrecoverability for erasure compliance, run explicitly so the
      # MEASURED residual-fidelity numbers land in the CI log (Linux only — one
      # canonical record; the test also runs on every OS via `cargo test` above).
      # The three gated cases: (a) revocation ⇒ EjectHardDelete leaves NO
      # recoverable tier, (b) the measured noise floor below n_source symbols,
      # (c) N→1 aggregation erases the individual below the 1/N gist bound.
      - name: Noise floor proof (MEASURED, Linux)
        if: runner.os == 'Linux'
        run: cargo test --test noise_floor -- --nocapture
      # The PyO3 wheel surface (Linux only; libpython linked, no extension-module).
      - name: clippy (python surface, Linux)
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --features python -- -D warnings
      # Populate the cross-repo CIRISCache blob on main under the SERVER key.
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Win7-SP1 → Win11 build check (CIRISVerify#67 pattern, mirrored by every
  # upstream substrate crate). Rust 1.78 raised the windows-msvc std floor to
  # Win10 1809; a default-target build hard-imports Win8/Win10 APIs. We build
  # the Tier-3 target `x86_64-win7-windows-msvc` (std keeps the Win7 fallbacks)
  # on nightly + `-Zbuild-std` so the fabric node still LoadLibrary's on Win7.
  # build-std crate list is `std,panic_abort`; panic_abort is required by std's
  # own build (omit → E0463) and does NOT set the panic strategy, which stays
  # "unwind" via the Cargo.toml profile pin (so any catch_unwind sites work).
  # RE-ENABLED in 0.5.59 (the cross-repo CIRISCache is warm, so the build-std
  # substrate relink is cheap again; dropped in 0.5.57).
  win7-build-std:
    name: Win7 build-std check
    runs-on: windows-latest
    # NON-GATING: Win7 is a Tier-3 best-effort lane (nightly + -Zbuild-std on a
    # pinned nightly). A nightly regression / pin issue must not redden CI — it
    # builds when it can. The pinned-nightly main run still warms the win7
    # CIRISCache server-layer blob for later win7 builds either way.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # PINNED to nightly-2026-06-12 (the date persist uses for its build-std
      # windows lane — proven good) so RUSTC in the CIRISCache key is STABLE: the
      # win7 server-layer blob this job saves on main is then re-found by every
      # later win7 build, instead of the key drifting daily under @nightly.
      # (Upstream verify/persist/edge never build this target, so only the server
      # layer can hit — see CIRISServer#99.)
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-12
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: ci-win7-build-std
      # CIRISCache (CIRISServer#99) — 4-layer centipede. PLAT=windows-x64 (NOT a
      # separate win7 token): persist/edge save their win7-build-std blob under
      # `windows-x64`, disambiguated by the NIGHTLY rustc token — which this leg
      # also reports (`rustc -V` = the pinned nightly, since stable isn't installed
      # on the windows leg). Shared nightly-2026-06-12 pin ⇒ matching rustc token ⇒
      # the verify/persist/edge cross-repo layers HIT (target/ included), not just
      # registry. Distinct from the stable windows wheel (different rustc token).
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT=windows-x64
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      - name: CIRISCache restore (verify layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-verify }}
      - name: CIRISCache restore (persist layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-persist }}
      - name: CIRISCache restore (edge layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-edge }}
      - name: CIRISCache restore (server layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
      - name: Build (x86_64-win7-windows-msvc, build-std)
        shell: bash
        run: |
          # LNK1181 workaround (persist's recipe): build-std relinks std, which
          # needs the windows_x86_64_msvc import-lib dirs on LIB. openssl/tss2 are
          # NOT pulled on this windows target (postgres+tpm are Linux-only), so no
          # vcpkg/openssl-src build is needed here anymore.
          cargo fetch
          extra=""
          while IFS= read -r d; do
            extra="${extra};$(cygpath -w "$d")"
          done < <(find "$HOME/.cargo/registry/src" -type d -path '*windows_x86_64_msvc-*/lib' 2>/dev/null | sort -u)
          [ -n "$extra" ] && export LIB="${LIB:-}${extra}"
          cargo +nightly build --release \
            --target x86_64-win7-windows-msvc \
            -Z build-std=std,panic_abort \
            -p ciris-server
      # Populate the cross-repo CIRISCache blob on main under the SERVER key.
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}
