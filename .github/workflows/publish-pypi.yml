name: publish-pypi

# Build the ciris-server abi3 wheels for every platform, gate them through the
# CIRISConformance cohabitation suite, then publish to PyPI via **Trusted
# Publishing** (OIDC — no stored API token). Fires on a v* tag.
#
# Trusted-publisher registration (one-time, done on PyPI by a maintainer):
#   PyPI project:      ciris-server
#   Owner:             CIRISAI
#   Repository:        CIRISServer
#   Workflow filename: publish-pypi.yml
#   Environment:       pypi
# Until that's registered, the `publish` job's OIDC mint will fail — the build
# + conformance jobs still run, so the gate is exercised on every tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (true) or build+conformance only (false)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Build abi3 wheels per platform ─────────────────────────────────────────
  # Linux: build on the native runners with apt deps + patchelf (NOT a manylinux
  # container). The keyring's tss-esapi-sys needs tpm2-tss >= 3.x; the
  # manylinux_2_28/el8 container only ships 2.3.2 → "tss2-sys not found". Ubuntu
  # 24.04 has 4.0.x, and maturin+patchelf produce a manylinux_2_39 wheel — the
  # same recipe the sister wheels ship (persist manylinux_2_38, edge _2_39) and
  # the one the green conformance build-wheel job uses.
  linux:
    name: wheel ${{ matrix.plat.name }}
    runs-on: ${{ matrix.plat.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        plat:
          - { name: linux-x86_64, runs-on: ubuntu-latest }
          - { name: linux-aarch64, runs-on: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev libsqlite3-dev patchelf
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ── Build + stage the per-platform desktop JAR BEFORE maturin ──────────
      # The Compose uber-jar is named CIRIS-<platform>-<ver>.jar by the gradle
      # plugin (e.g. CIRIS-linux-x64-2.6.0.jar). maturin then bundles it into
      # the wheel via [tool.maturin] include (see pyproject.toml). System Java
      # only — no JRE is bundled, keeping each wheel under PyPI's 100 MB cap.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build + stage desktop JAR
        working-directory: client
        run: |
          chmod +x ./gradlew
          ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
          mkdir -p ../python/ciris_server/desktop_app
          cp desktopApp/build/compose/jars/CIRIS-*.jar ../python/ciris_server/desktop_app/
          ls -l ../python/ciris_server/desktop_app/
      - name: Build wheel (maturin)
        run: |
          python -m pip install --upgrade pip
          pip install "maturin>=1.7,<2"
          maturin build --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.plat.name }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    name: wheel macos-${{ matrix.target }}
    runs-on: macos-14
    # KNOWN LIMITATION (macos x86_64 leg): the macos-14 runner is Apple Silicon,
    # so `packageUberJarForCurrentOS` produces the arm64 macOS JAR for BOTH
    # matrix legs. The x86_64 *wheel* (the Rust .so) is a proper cross-compile,
    # but it carries the arm64 desktop JAR. Compose JARs are not single-arch JVM
    # bytecode for the app classes, but the Compose/Skiko *native* libs inside
    # are per-arch — so an Intel-mac user installing the x86_64 wheel may hit a
    # Skiko load error. To ship a true Intel JAR, add a macos-13 (Intel) runner
    # leg, or `gradlew packageUberJarForCurrentOS` under an x86_64 JDK. Left as a
    # follow-up; arm64 (the common case) is correct.
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # The Compose plugin packages a current-OS uber-jar; on the macos-14
      # runner that is the macOS JAR (CIRIS-macos-<arch>-<ver>.jar). The arch
      # follows the runner/JDK, so the aarch64 + x86_64 matrix legs each stage
      # the JAR matching their wheel target. maturin bundles it via include.
      - name: Build + stage desktop JAR
        working-directory: client
        run: |
          chmod +x ./gradlew
          ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
          mkdir -p ../python/ciris_server/desktop_app
          cp desktopApp/build/compose/jars/CIRIS-*.jar ../python/ciris_server/desktop_app/
          ls -l ../python/ciris_server/desktop_app/
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    name: wheel windows-x64
    runs-on: windows-latest
    # The family's Windows wheel has historically failed on persist's Unix-only
    # paths (CIRISPersist#200 / CIRISEdge#90). Don't block the release on it;
    # publish whatever platforms succeed. Remove continue-on-error once green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build + stage desktop JAR
        working-directory: client
        shell: bash
        run: |
          ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
          mkdir -p ../python/ciris_server/desktop_app
          cp desktopApp/build/compose/jars/CIRIS-*.jar ../python/ciris_server/desktop_app/
          ls -l ../python/ciris_server/desktop_app/
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist/*.whl
          if-no-files-found: warn

  # Android abi3 wheels (incl. arm32 armeabi-v7a) — the CIRISAgent KMP client's
  # mobile targets. NDK cross-compile + libpython stub, the substrate recipe
  # (CIRISVerify/Persist/Edge). continue-on-error while the cross lane iterates
  # to green — it must not block the desktop/server publish.
  android:
    name: wheel android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    # Green as of 0.2.1 (arm64-v8a + armeabi-v7a both package). A required gate now.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { abi: armeabi-v7a, target: armv7-linux-androideabi, clang: armv7a-linux-androideabi24, legacy: arm-linux-androideabi,  pw: 32 }
          - { abi: arm64-v8a,   target: aarch64-linux-android,   clang: aarch64-linux-android24,    legacy: aarch64-linux-android, pw: 64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26b
          add-to-path: true
      - name: PyO3 cross config + libpython stub
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          CFG="${RUNNER_TEMP}/pyo3-android.config"
          {
            echo "implementation=CPython"; echo "version=3.10"; echo "shared=false"
            echo "abi3=true"; echo "lib_name=python3.10"; echo "lib_dir="
            echo "executable="; echo "pointer_width=${{ matrix.pw }}"; echo "build_flags="
            echo "suppress_build_script_link_lines=true"
          } > "$CFG"
          echo "PYO3_CONFIG_FILE=${CFG}" >> "$GITHUB_ENV"
          STUB="${RUNNER_TEMP}/python-stub"; mkdir -p "$STUB"
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          echo 'void __pystub(void){}' | \
            "${TC}/bin/${{ matrix.clang }}-clang" -shared -nostdlib \
              -Wl,-soname,libpython3.10.so -o "${STUB}/libpython3.10.so" -x c -
      - name: Build wheel (maturin, Android NDK)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_API_LEVEL: "24" # maturin can't infer the API level for armv7 (it can for arm64)
        run: |
          # cc-rs guesses the wrong NDK clang name (arm-linux-androideabi-clang);
          # point CC/CXX/AR + the cargo linker at the real r26b tools (what
          # cargo-ndk would set). Var names use the underscore/SCREAMING target.
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CLANG="${TC}/${{ matrix.clang }}-clang"
          TUS="$(echo '${{ matrix.target }}' | tr - _)"
          TSC="$(echo "$TUS" | tr a-z A-Z)"
          export "CC_${TUS}=${CLANG}"
          export "CXX_${TUS}=${CLANG}++"
          export "AR_${TUS}=${TC}/llvm-ar"
          export "RANLIB_${TUS}=${TC}/llvm-ranlib"
          export "CARGO_TARGET_${TSC}_LINKER=${CLANG}"
          # openssl-src (pulled by persist on android) hardcodes the LEGACY NDK
          # tool names that r26b dropped; shim them → the r26b llvm tools.
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          ln -sf "${TC}/llvm-ar"     "${TC}/${{ matrix.legacy }}-ar"
          ln -sf "${TC}/llvm-ranlib" "${TC}/${{ matrix.legacy }}-ranlib"
          ln -sf "${CLANG}"          "${TC}/${{ matrix.legacy }}-clang"
          ln -sf "${CLANG}++"        "${TC}/${{ matrix.legacy }}-clang++"
          export PATH="${TC}:${PATH}"
          export RUSTFLAGS="-L ${RUNNER_TEMP}/python-stub -C link-arg=-Wl,--no-as-needed -C link-arg=-lpython3.10"
          python -m pip install --upgrade pip
          pip install "maturin>=1.7,<2"
          maturin build --release --out dist --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-android-${{ matrix.abi }}
          path: dist/*.whl
          if-no-files-found: warn

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── Gate: the linux wheel must pass cohabitation conformance ───────────────
  # A failure here BLOCKS publish (the substrate-sister discipline). Runs the
  # CIRISConformance suite with the just-built wheel + the pinned triple.
  conformance-gate:
    name: cohabitation gate (linux-x86_64 × ${{ matrix.backend }})
    needs: linux
    strategy:
      fail-fast: true
      matrix:
        backend: [sqlite, postgres]
    uses: CIRISAI/CIRISConformance/.github/workflows/run-against-wheels.yml@main
    with:
      runs-on: ubuntu-latest
      backend: ${{ matrix.backend }}
      under-test-wheel-artifact: wheels-linux-x86_64
      under-test-package: ciris-server
      # matrix-ref defaults to main = the persist-7 triple (CIRISConformance#14, merged).

  # ── Publish to PyPI via Trusted Publishing (OIDC) ──────────────────────────
  publish:
    name: publish to PyPI
    needs: [linux, macos, windows, android, sdist, conformance-gate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing — no stored secret
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - run: ls -l dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Trusted Publishing: no `password:` — the OIDC identity is verified
          # against the publisher registered on PyPI.
          # Idempotent re-cuts: if a tag is re-cut onto a new commit, the wheels
          # for any platform already on PyPI are skipped instead of 400-ing the
          # whole upload — a clean re-cut publishes only the newly-built files.
          skip-existing: true
