name: client-artifacts

# Builds the user-facing CIRIS client artifacts and uploads them for download:
#   * Android debug APK (the vendored KMP client — identity page, contacts,
#     delegations, on-device YubiKey NFC fed-ID, embedded Python agent runtime).
#   * Windows desktop installer (added in a follow-up job).
#
# These are CI artifacts for humans to grab, NOT a pass/fail gate on the Rust
# build (that is ci.yml). They run on main, on PRs that touch the client/build,
# and on demand.
#
# The Android build embeds the canonical Python runtime via Chaquopy, staged by
# `tools.dev.stage_runtime`, which lives in CIRISAgent — this client was vendored
# out of that repo. So the APK job checks out CIRISAgent alongside and points the
# gradle staging step at it via -PcirisAgentRoot.

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/client-artifacts.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client-artifacts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-apk:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout CIRISServer
        uses: actions/checkout@v4

      - name: Checkout CIRISAgent (canonical Python runtime for Chaquopy)
        uses: actions/checkout@v4
        with:
          repository: CIRISAI/CIRISAgent
          path: .ciris-agent
          # Public repo: the default GITHUB_TOKEN reads it. If CIRISAgent is
          # ever made private, set a CIRISAGENT_TOKEN PAT here.
          token: ${{ secrets.CIRISAGENT_TOKEN || github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle (distribution + dependency cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up Python 3.10 (required by Chaquopy)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Symlink python3.10 for Chaquopy
        run: |
          PYTHON_PATH=$(which python3.10)
          if [ ! -f /usr/bin/python3.10 ] && [ -n "$PYTHON_PATH" ]; then
            sudo ln -s "$PYTHON_PATH" /usr/bin/python3.10
          fi

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='ciris-server'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ciris-server version: $VERSION"

      - name: Build debug APK
        run: |
          cd client
          ./gradlew :androidApp:assembleDebug \
            -PcirisAgentRoot="$GITHUB_WORKSPACE/.ciris-agent" --no-daemon
          VERSION="${{ steps.version.outputs.version }}"
          cp androidApp/build/outputs/apk/debug/androidApp-debug.apk \
             "androidApp/build/outputs/apk/debug/CIRIS-Server-$VERSION-debug.apk"
          ls -lh androidApp/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-server-android-apk
          path: client/androidApp/build/outputs/apk/debug/CIRIS-Server-*.apk
          retention-days: 14

  windows-installer:
    name: Windows desktop installer
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Rust (maturin builds the abi3 wheel)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java 17 (Liberica — Win7-capable jlink runtime)
        # Liberica/Zulu retain Windows 7 support; Temurin dropped it. The
        # trimmed jlink runtime here ships inside the installer, so even the
        # mainline (Win8.1-floor) build uses a Win7-capable JDK for the JRE.
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'

      - name: Set up Gradle (distribution + dependency cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Get version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python -c "import sys,json; print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='ciris-server'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ciris-server version: $VERSION"

      - name: Build CIRIS Desktop UberJar
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 60
          shell: bash
          command: |
            cd client
            ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
            ls -lh desktopApp/build/compose/jars/

      - name: Stage the desktop JAR into the wheel tree
        shell: bash
        run: |
          mkdir -p python/ciris_server/desktop_app
          cp client/desktopApp/build/compose/jars/CIRIS-windows-*.jar \
             python/ciris_server/desktop_app/
          ls -lh python/ciris_server/desktop_app/

      - name: Build + install the ciris-server wheel (maturin)
        shell: bash
        run: |
          python -m pip install --upgrade pip maturin pyinstaller
          # The wheel carries the staged JAR (pyproject [tool.maturin] include).
          maturin build --release --out dist-wheel
          WHL=$(ls dist-wheel/*.whl | head -1)
          echo "installing $WHL"
          pip install "$WHL"
          python -c "import ciris_server; from ciris_server.cli import main; print('ciris_server import OK')"

      - name: Build PyInstaller bundle
        shell: bash
        run: |
          cd installers/windows
          pyinstaller ciris-server.spec --noconfirm
          ls dist/ciris-server/ | head -20

      - name: Stage bundle for Inno Setup
        shell: bash
        run: |
          mkdir -p dist
          mv installers/windows/dist/ciris-server dist/
          # confirm the desktop JAR rode into the bundle
          ls dist/ciris-server/_internal/ciris_server/desktop_app/ || \
            echo "WARN: desktop JAR not found in bundle (launcher will fall back to system layout)"

      - name: Trim JRE via jlink (Liberica)
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path 'client\desktopApp\build\compose\jars' -Filter 'CIRIS-windows-*.jar' | Select-Object -First 1
          if (-not $jar) { Write-Error "No CIRIS-windows-*.jar found"; exit 1 }
          .\installers\windows\bundle-jre.ps1 -JarPath $jar.FullName -OutputDir dist\runtime

      - name: Fetch Universal CRT redist (Windows 7 prerequisite, best-effort)
        continue-on-error: true
        shell: pwsh
        run: |
          $dst = "installers/windows/redist"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $url = "https://download.microsoft.com/download/5/B/C/5BC5DBB3-652D-4DCE-B14A-475AB85EEF6E/Windows6.1-KB2999226-x64.msu"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$dst/Windows6.1-KB2999226-x64.msu" -UseBasicParsing -TimeoutSec 120
          } catch { Write-Warning "UCRT fetch failed ($_); Win7 users hand-provision." }

      - name: Install Inno Setup
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Building installer for ciris-server $version"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
              "/DCirisVersion=$version" `
              installers\windows\ciris-server-installer.iss
          Get-ChildItem dist\*.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-server-windows-installer
          path: dist/CIRIS-Server-Setup-*.exe
          retention-days: 14
