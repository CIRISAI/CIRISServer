name: conformance

# Cohabitation conformance: build the ciris-server abi3 wheel, then drive it
# through CIRISConformance's reusable suite alongside the pinned substrate
# triple (persist / edge / verify) — the production cohabitation shape (the
# wheels run together in one Python process). CIRISServer carries the absorbed
# lens surface, so the suite's `requires_lens` tests run against THIS wheel.
#
# A failure here is the cohabitation contract failing — the same gate that
# blocks publish-pypi in the substrate sisters' release flows. Wired on PR +
# push now; promote to a publish gate when the PyPI release job lands.

on:
  push:
    branches: [main]
    # Docs-only commits don't change the wheel or the cohabitation contract.
    paths-ignore:
      - "**/*.md"
      - "FSD/**"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "FSD/**"
      - "docs/**"
  workflow_dispatch:

# Supersede stale runs on the same ref; a tag ref is distinct (release safe).
concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # CIRISCache save (GHCR) on main — see the build-wheel job

jobs:
  build-wheel:
    name: build ciris-server wheel (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Cache the cargo registry/git + the release target/ deps. This is the
      # WARMER for the tag-triggered publish-pypi linux-x86_64 wheel: it builds
      # the SAME `maturin build --release` on the SAME runner, so the substrate
      # (persist/edge/verify + transitive) compiled here is restored there.
      # `shared-key` overrides rust-cache's default per-job key so the two
      # workflows share one cache; saving is restricted to main (GitHub scopes
      # caches by ref — only the default branch is readable from a tag run).
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          shared-key: release-linux-x86_64
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # CIRISCache (CIRISServer#99) — 4-layer centipede layered over the Swatinem
      # GHA L1 above (the documented two-tier model). Restore verify→persist→edge→
      # server; this on-main build POPULATES ghcr.io/cirisai/ciriscache under the
      # SERVER -s key (no collision with edge's canonical blob). rust-toolchain.toml
      # pins stable so the rustc in the key matches across repos.
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT="linux-x86_64"
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
            echo "key-server-prefix=${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      # Deepest-first, first-hit-wins (CIRISCache restore@v2): one extraction of
      # the deepest available blob (cumulative supersets) instead of N redundant.
      - name: CIRISCache restore (server→edge→persist→verify, first hit)
        uses: CIRISAI/CIRISCache/restore@v2
        continue-on-error: true
        with:
          keys: |
            ${{ steps.cachekey.outputs.key }}
            ${{ steps.cachekey.outputs.key-server-prefix }}*
            ${{ steps.cachekey.outputs.key-edge }}
            ${{ steps.cachekey.outputs.key-persist }}
            ${{ steps.cachekey.outputs.key-verify }}
      - name: Install build deps
        #: the family links the TPM keyring backend on Linux.
        # libsqlite3-dev: persist's sqlite backend.
        # patchelf: maturin's manylinux repair (the wheel dynamically links
        # libtss2/libcrypto) — without it `maturin build` fails.
        run: |
          # Drop the preinstalled Microsoft/azure-cli apt repo: it intermittently
          # 403s and tanks apt-get update (its packages are not needed here).
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libudev-dev patchelf
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel (maturin)
        # [tool.maturin] in pyproject.toml supplies features = ["extension-module"]
        # + module-name = ciris_server; pyo3 abi3-py310 → one wheel for 3.10+.
        run: |
          python -m pip install --upgrade pip
          pip install "maturin>=1.7,<2"
          maturin build --release --strip --out dist
          ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: ciris_server-wheel-linux-x86_64
          path: dist/*.whl
          if-no-files-found: error
      # Populate the cross-repo CIRISCache blob on main under the SERVER key
      # (restore is anonymous on PRs; only main writes — public package,
      # GITHUB_TOKEN, no external secret).
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

  cohabitation-conformance:
    name: cohabitation (linux-x86_64 × ${{ matrix.backend }})
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, postgres]
    uses: CIRISAI/CIRISConformance/.github/workflows/run-against-wheels.yml@main
    with:
      runs-on: ubuntu-latest
      backend: ${{ matrix.backend }}
      under-test-wheel-artifact: ciris_server-wheel-linux-x86_64
      under-test-package: ciris-server
      # matrix-ref defaults to main, which pins the persist-7 substrate triple
      # + maps requires_lens → ciris_server (CIRISConformance#14, merged).
