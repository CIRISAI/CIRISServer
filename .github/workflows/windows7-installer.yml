# Windows 7 SP1 installer variant for ciris-server — EXPERIMENTAL, opt-in.
#
# Produces CIRIS-Server-Setup-<ver>-win7-x64.exe: the same Inno Setup wrapper as
# the mainline installer, but built to actually launch on Win7 SP1, which needs
# BOTH halves to be Win7-capable:
#   * Python: official CPython gates on Win8.1+ (PathCch* / api-set imports), so
#     this bundles a community-patched interpreter (adang1345/PythonVista).
#   * Rust node: stable windows-msvc std requires Win10 1809+. We build the
#     ciris_server._native extension for the Tier-3 `x86_64-win7-windows-msvc`
#     target with `-Z build-std` (nightly), which keeps std's Win7 fallbacks —
#     same recipe as ci.yml's win7-build-std check, here driven through maturin.
#
# SUPPLY-CHAIN DECISION (owner's call, NOT auto-promoted): this embeds a
# THIRD-PARTY-PATCHED Python interpreter into a CIRIS installer. So this workflow:
#   * is workflow_dispatch ONLY — never runs on push/PR/tag,
#   * FAILS CLOSED on the interpreter hash (the dispatcher pastes the SHA256 they
#     verified upstream; a mismatch aborts the build),
#   * produces a CI artifact labelled win7-EXPERIMENTAL — NOT wired into any
#     release. Promotion is gated on (a) the owner accepting the patched
#     interpreter and (b) an on-device Win7 SP1 acceptance test.

name: Windows 7 Installer (ciris-server, experimental)

on:
  workflow_dispatch:
    inputs:
      python_win7_version:
        description: "PythonVista patched CPython version (a 3.12.x folder in adang1345/PythonVista)"
        required: true
        default: "3.12.13"
      python_win7_sha256:
        description: "SHA256 of python-<ver>-amd64-full.exe, verified by YOU upstream. Build fails closed on mismatch."
        required: true

permissions:
  contents: read
  packages: write   # CIRISCache save (GHCR) on main — CIRISServer#99

jobs:
  build-win7-installer:
    name: Build Windows 7 Installer (experimental)
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      # NOTE: @nightly tracks the LATEST nightly (matches the historical config).
      # Pinning a fixed nightly date here would improve win7 CIRISCache cache-key
      # stability (RUSTC is part of the key) — follow-up, NOT done now because a
      # wrong/yanked date can break -Zbuild-std.
      - name: Set up nightly Rust (build-std for the Win7 target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # CIRISCache (CIRISServer#99) — 4-layer centipede. PLAT=win7-x64; RUSTC is a
      # nightly string so it keys separately from the stable lanes. Restore
      # verify→persist→edge→server; SAVE under the server -s key on main (this is
      # workflow_dispatch only, so the save fires only when dispatched from main).
      - name: Compute CIRISCache keys (4-layer centipede, CIRISServer#99)
        id: cachekey
        shell: bash
        run: |
          PLAT=win7-x64
          RUSTC=$(rustc -V | awk '{print $2}')
          S=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          P=$(grep -m1 'CIRISPersist.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          V=$(grep -m1 'CIRISVerify.*tag = "v'  Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          EDGE=$(grep -m1 'CIRISEdge.*tag = "v' Cargo.toml | sed -E 's/.*tag = "v([0-9.]+)".*/\1/')
          BASE="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}"
          KEY_VERIFY="${BASE}-pnone-enone-v${V:-none}"
          KEY_PERSIST="${BASE}-p${P:-none}-enone-v${V:-none}"
          KEY_EDGE="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}"
          KEY_SERVER="${BASE}-p${P:-none}-e${EDGE:-none}-v${V:-none}-s${S:-none}"
          {
            echo "key-verify=${KEY_VERIFY}"
            echo "key-persist=${KEY_PERSIST}"
            echo "key-edge=${KEY_EDGE}"
            echo "key=${KEY_SERVER}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::CIRISCache (${PLAT}): S=${S:-NONE} P=${P:-NONE} V=${V:-NONE} EDGE=${EDGE:-NONE} RUSTC=${RUSTC}"
          echo "::notice::${KEY_VERIFY}"
          echo "::notice::${KEY_PERSIST}"
          echo "::notice::${KEY_EDGE}"
          echo "::notice::${KEY_SERVER}"
      - name: CIRISCache restore (verify layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-verify }}
      - name: CIRISCache restore (persist layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-persist }}
      - name: CIRISCache restore (edge layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key-edge }}
      - name: CIRISCache restore (server layer)
        uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}

      - name: Set up Java 17 (Liberica — Win7-capable jlink runtime)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Download + verify Win7-capable CPython (fail-closed)
        id: win7py
        shell: pwsh
        run: |
          $ver = "${{ inputs.python_win7_version }}"
          $expected = "${{ inputs.python_win7_sha256 }}".Trim().ToLower()
          if ($expected -notmatch '^[0-9a-f]{64}$') {
            Write-Error "python_win7_sha256 must be a 64-hex SHA256 you verified upstream. Refusing to build."
            exit 1
          }
          $url = "https://raw.githubusercontent.com/adang1345/PythonVista/master/$ver/python-$ver-amd64-full.exe"
          $exe = "$env:RUNNER_TEMP\python-$ver-amd64-full.exe"
          Write-Host "Fetching $url"
          Invoke-WebRequest -Uri $url -OutFile $exe -UseBasicParsing -TimeoutSec 180
          $actual = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLower()
          Write-Host "expected: $expected"
          Write-Host "actual:   $actual"
          if ($actual -ne $expected) {
            Write-Error "SHA256 MISMATCH — refusing to bundle an unverified interpreter. Aborting."
            exit 1
          }
          Write-Host "Interpreter hash verified."
          "installer_exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Silent-install the Win7 CPython + create venv
        id: venv
        shell: pwsh
        run: |
          $dir = "$env:RUNNER_TEMP\py-win7"
          $exe = "${{ steps.win7py.outputs.installer_exe }}"
          Start-Process -FilePath $exe -ArgumentList @(
            "/quiet", "InstallAllUsers=0", "PrependPath=0", "Include_test=0",
            "Include_pip=1", "TargetDir=$dir") -Wait
          $py = "$dir\python.exe"
          if (-not (Test-Path $py)) { Write-Error "patched Python not installed at $py"; exit 1 }
          & $py --version
          & $py -m venv "$env:RUNNER_TEMP\venv-win7"
          "venv=$env:RUNNER_TEMP\venv-win7" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install build tools into the Win7 venv
        shell: pwsh
        run: |
          $py = "${{ steps.venv.outputs.venv }}\Scripts\python.exe"
          & $py -m pip install --upgrade pip maturin pyinstaller

      - name: Get version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python -c "import sys,json; print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='ciris-server'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build CIRIS Desktop UberJar
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 60
          shell: bash
          command: |
            cd client
            ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
            ls -lh desktopApp/build/compose/jars/

      - name: Stage the desktop JAR into the wheel tree
        shell: bash
        run: |
          mkdir -p python/ciris_server/desktop_app
          cp client/desktopApp/build/compose/jars/CIRIS-windows-*.jar python/ciris_server/desktop_app/

      - name: Build + install the wheel for the Win7 Rust target (build-std)
        shell: pwsh
        env:
          # cargo reads -Z build-std from this env var; nightly is active.
          CARGO_UNSTABLE_BUILD_STD: "std,panic_abort"
        run: |
          $py = "${{ steps.venv.outputs.venv }}\Scripts\python.exe"
          # LNK1181 workaround (persist's recipe): build-std relinks std, which
          # needs the windows_x86_64_msvc import-lib dirs on LIB.
          cargo fetch
          $extra = ""
          Get-ChildItem "$env:USERPROFILE\.cargo\registry\src" -Recurse -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'windows_x86_64_msvc-.*\\lib$' } |
            ForEach-Object { $extra += ";$($_.FullName)" }
          if ($extra) { $env:LIB = "$env:LIB$extra" }
          & $py -m maturin build --release --target x86_64-win7-windows-msvc --out dist-wheel
          $whl = Get-ChildItem dist-wheel\*.whl | Select-Object -First 1
          Write-Host "installing $($whl.FullName)"
          & $py -m pip install $whl.FullName
          & $py -c "import ciris_server; from ciris_server.cli import main; print('ciris_server import OK')"

      # Populate the cross-repo CIRISCache blob on main under the SERVER key.
      - name: CIRISCache save (server layer, main only)
        uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ steps.cachekey.outputs.key }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PyInstaller bundle (under the Win7 interpreter)
        shell: pwsh
        run: |
          $py = "${{ steps.venv.outputs.venv }}\Scripts\python.exe"
          cd installers\windows
          & $py -m PyInstaller ciris-server.spec --noconfirm
          Get-ChildItem dist\ciris-server\ | Select-Object -First 20

      - name: Stage bundle for Inno Setup
        shell: bash
        run: |
          mkdir -p dist
          mv installers/windows/dist/ciris-server dist/

      - name: Trim JRE via jlink (Liberica)
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path 'client\desktopApp\build\compose\jars' -Filter 'CIRIS-windows-*.jar' | Select-Object -First 1
          if (-not $jar) { Write-Error "No CIRIS-windows-*.jar found"; exit 1 }
          .\installers\windows\bundle-jre.ps1 -JarPath $jar.FullName -OutputDir dist\runtime

      - name: Fetch Universal CRT redist (KB2999226, best-effort)
        continue-on-error: true
        shell: pwsh
        run: |
          $dst = "installers/windows/redist"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $url = "https://download.microsoft.com/download/5/B/C/5BC5DBB3-652D-4DCE-B14A-475AB85EEF6E/Windows6.1-KB2999226-x64.msu"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$dst/Windows6.1-KB2999226-x64.msu" -UseBasicParsing -TimeoutSec 120
          } catch { Write-Warning "UCRT fetch failed ($_); Win7 users hand-provision." }

      - name: Install Inno Setup
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: choco install innosetup -y --no-progress

      - name: Build installer (win7-labelled)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Building Win7 installer for ciris-server $version"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
              "/DCirisVersion=$version" `
              "/DOutputSuffix=-win7" `
              "/DWin7Tier=1" `
              installers\windows\ciris-server-installer.iss
          Get-ChildItem dist\*.exe

      - name: Upload Win7 installer artifact (EXPERIMENTAL)
        uses: actions/upload-artifact@v4
        with:
          name: ciris-server-windows7-installer-experimental
          path: dist/CIRIS-Server-Setup-*.exe
          retention-days: 14
