# cargo-deny config — enforces MISSION.md §6 license-locked mission
# preservation. Inherits the dep-tree concerns persist + edge +
# verify already curated; CIRISLensCore transitively pulls the same
# trees through ciris-persist and ciris-edge.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "OpenSSL",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "CC0-1.0",
    # webpki-roots 0.26+ — CDLA-Permissive-2.0 (Linux Foundation's
    # Community Data License Agreement, permissive variant). AGPL-
    # compatible; transitive via ciris-verify-core's reqwest/ureq
    # stack — same finding persist + edge document.
    "CDLA-Permissive-2.0",
    # borrow-or-share v0.2.4 — MIT-0 (MIT No Attribution). Permissive;
    # AGPL-compatible. Transitive via fluent-uri → reqwest (edge
    # v0.10.0's transport-http stack).
    "MIT-0",
    # libbz2-rs-sys (Rust bzip2 port). Permissive BSD-style; AGPL-
    # compatible. Transitive via reticulum-core's `compression`
    # feature → reticulum-std default → ciris-edge `transport-
    # reticulum` (auto-enabled by edge's `pyo3` feature).
    "bzip2-1.0.6",
]
confidence-threshold = 0.85

# unescaper v0.1.8 declares `license = "GPL-3.0/MIT"` — the
# deprecated SPDX slash-separator dual-license syntax cargo-deny
# can't parse. The crate's intent is MIT-or-GPL; pick MIT (already
# in the allow list above; AGPL-compatible). Transitive via
# serialport → tokio-serial → reticulum-std → ciris-edge (edge's
# `pyo3` feature implies `transport-reticulum`, OQ-07).
[[licenses.clarify]]
name = "unescaper"
expression = "MIT"
license-files = []

[bans]
# Same posture as edge — duplicate transitive deps through pyo3 +
# tokio + serde + crypto stacks. None on lens-core's science-layer
# hot path. Dedup pass when the dep tree stabilizes.
multiple-versions = "allow"
wildcards         = "deny"

[advisories]
yanked = "warn"
# Inherited ignores from CIRISPersist/CIRISEdge — same dep tree,
# same transitive-only exposure. None of these advisories touch
# lens-core's science-layer hot path.
ignore = [
    "RUSTSEC-2024-0388",  # derivative unmaintained (via ciris-keyring TPM derive stack)
    "RUSTSEC-2024-0384",  # instant unmaintained (Phase 3 Reticulum may obsolete)

    # rustls / webpki / DNS branch — transitive via ciris-verify-core's
    # verification stack.
    "RUSTSEC-2026-0119",  # hickory-proto DNS encoding O(n²); lens-core has no DNS encode path
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained
    "RUSTSEC-2026-0098",  # rustls-webpki URI-name constraint (no URI SAN validation here)
    "RUSTSEC-2026-0099",  # rustls-webpki wildcard-DNS constraint (no name-constraint certs)
    "RUSTSEC-2026-0104",  # rustls-webpki CRL parse panic (no CRL parsing here)

    # `unic-*` family unmaintained.
    # Transitive: edge v0.13.0+ → uniffi → rustpython-parser → unic-*.
    # No CLI / parser exposure on lens-core's hot path; UniFFI may
    # rewire away from rustpython-parser, in which case these auto-
    # disappear.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0090",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",

    # pyo3 0.28.3 — both fixed in pyo3 0.29.0. The CIRIS family is pinned
    # to pyo3 0.28 (edge + persist + lens-core); a unilateral 0.29 bump
    # would put two pyo3 versions / abi3 runtimes in the cohabitation
    # graph. The 0.28→0.29 upgrade is a coordinated family lockstep move
    # (CIRISEdge#89, v2.2.0 target); these auto-disappear then. Neither is
    # reachable on lens-core's path — 0176 is unsafe nth/nth_back on
    # PyList/PyTuple iterators (lens-core never offset-indexes Python
    # sequences); 0177 is a missing Sync bound on PyCFunction::new_closure
    # (lens-core registers no closure pyfunctions, only #[pyfunction]/
    # #[pymethods]).
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",
]

[sources]
unknown-registry = "deny"
unknown-git      = "warn"
# v0.1.0 — persist + edge + verify all ship as `publish = false`
# Rust crates pulled via git tag. Allow-list explicitly until they're
# on crates.io (or a private registry).
allow-git = [
    "https://github.com/CIRISAI/CIRISPersist",
    "https://github.com/CIRISAI/CIRISEdge",
    "https://github.com/CIRISAI/CIRISVerify",
    # Leviculum — CIRIS-AI's reticulum-rs / reticulum-core. Transitive
    # via ciris-edge's `transport-reticulum` feature (auto-enabled by
    # edge's `pyo3` feature per CIRISEdge#16 cohabitation merge).
    "https://github.com/CIRISAI/leviculum",
]
