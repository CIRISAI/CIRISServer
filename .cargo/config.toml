# Android cross-link targets (NDK API 24). The 16 KiB max-page-size arg is the
# Android-15+ compatibility flag the substrate crates use. Mirrors
# CIRISVerify/.cargo/config.toml so the android wheel lane links cleanly.
[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.aarch64-linux-android]
linker = "aarch64-linux-android24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
linker = "x86_64-linux-android24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]
