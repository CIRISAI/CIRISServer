[package]
name = "ciris-server"
version = "0.5.0-spec.0"   # 0.5 = lens+registry (agent ~2.9.8); 1.0 = +node (agent ~2.9.10)
edition = "2021"
# MSRV floor is set by the substrate: ciris-verify v5.2.0 requires 1.86
# (persist v6.0.1 is 1.83). Build with the higher of the two.
rust-version = "1.86"
authors = ["Eric Moore <eric@ciris.ai>"]
description = "The fabric node — the federation's headless cohabitation runtime (registry + lens [+ node] over one shared substrate). agent = fabric node + brain. Shipped as both the ciris-server binary and a PyO3 abi3 wheel CIRISAgent consumes. See MISSION.md."
license = "AGPL-3.0-or-later"
repository = "https://github.com/CIRISAI/CIRISServer"
readme = "README.md"
publish = false

# CIRISServer is ONE cohabitation composition in TWO shapes (MISSION.md §1.2/§6):
#   - [lib] cdylib  → the PyO3 abi3 wheel CIRISAgent pip-installs (the agent is
#                     pure Python; it consumes ciris-server, not the cores).
#   - [lib] rlib    → so the ciris-server binary links the same composition.
#   - [[bin]]       → the headless fabric node deployment.
# The composition lives in src/lib.rs; src/main.rs is a thin entry point.
[lib]
name = "ciris_server"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "ciris-server"
path = "src/main.rs"

[features]
default = []
# `python` pulls the PyO3 bindings (for the wheel). The binary builds WITHOUT it,
# so a plain `cargo build` never links libpython.
python = ["dep:pyo3", "dep:pyo3-async-runtimes"]
# `extension-module` is what maturin builds the wheel with (tells PyO3 not to
# link libpython). The bin must NOT enable it. See pyproject.toml [tool.maturin].
extension-module = ["python", "pyo3/extension-module"]

# ----------------------------------------------------------------------------
# Dependencies — CIRISServer AUTHORS NO PRIMITIVES. It composes the core
# libraries over ONE shared persist Engine (registry + lens read/write the same
# corpus in-process; per-slice views via Engine::from_shared).
#
# Substrate floor (the 6.x / edge-3.0 family; scouted 2026-06-13):
#   ciris-persist v6.0.1   (pyo3-0.29 reland; MSRV 1.83)
#   ciris-edge    v3.0.0   ── NOT YET TAGGED. The "family lockstep" work
#                             (persist 6.0.1 + pyo3 0.29) is uncommitted WIP on
#                             branch edge-v3-0-0-family-lockstep. This is the
#                             CURRENT gate: edge v2.4.0 pins persist <6, so
#                             persist 6.x and edge cannot co-resolve until v3.0.0
#                             tags. Pin the branch until then.  TODO(edge#v3): tag.
#   ciris-verify  v5.2.0   (verify_founder_quorum shipped v5.0.0/#31;
#                             threshold::verify_quorum_policy added #69)
#
# The cores must CO-BUMP to this floor before the binary builds — registry-core
# v2.3.0 and lens-core v1.4.2 are still on the persist-5.5.5/edge-2.2.2 floor.
# Lockstep happens via the CIRISConformance matrix. Until co-bumped tags exist,
# the core pins below track `main` and the binary does not build (Spec stage).
#
# Two adapter gaps remain before the composition compiles (MISSION.md §4):
#   1. registry-core has NO compose() entrypoint (boot is hand-rolled in its
#      bin's main.rs) and its edge identity is not injectable.
#   2. edge's shared-singleton acquisition (init_edge_runtime, leader election)
#      is a PyO3 #[pyfunction], not a Rust constructor — a pure-Rust fabric node
#      needs a Rust-native path (lens-core's ret_relay shows Rust Edge
#      construction; pair with persist's SharedInstanceLease for election).
# ----------------------------------------------------------------------------
[dependencies]
# The composed cores (authority + observation; node folds in at Server 1.0).
ciris-registry-core = { git = "https://github.com/CIRISAI/CIRISRegistry", branch = "main" } # TODO: pin the 6.x/edge-3.0 co-bumped tag + compose() adapter
ciris-lens-core     = { git = "https://github.com/CIRISAI/CIRISLensCore",  branch = "main" } # TODO: pin the 6.x/edge-3.0 co-bumped tag
# ciris-node-core   — folds in at Server 1.0 / agent 2.9.10 (a substrate gen behind: persist 4.10).

# The substrate trio (also pulled transitively by the cores; pinned here so the
# composition root owns the singleton construction).
ciris-persist     = { git = "https://github.com/CIRISAI/CIRISPersist", tag = "v6.0.1", features = ["postgres", "sqlite"] }
ciris-edge        = { git = "https://github.com/CIRISAI/CIRISEdge", branch = "edge-v3-0-0-family-lockstep", features = ["transport-reticulum-tcp-server", "transport-reticulum-tcp-client", "transport-reticulum-local"] } # TODO(edge#v3): pin tag = "v3.0.0" when cut
# Founder-quorum verification + key-id fingerprint at the composition root
# (threshold:: module path — NOT re-exported at the crate root).
ciris-verify-core = { git = "https://github.com/CIRISAI/CIRISVerify", tag = "v5.2.0" }

# PyO3 bindings for the abi3 wheel — optional, gated behind the `python` feature
# so the binary never links them. 0.29 matches the persist/edge family floor.
pyo3                = { version = "0.29", features = ["abi3-py310"], optional = true }
pyo3-async-runtimes = { version = "0.29", features = ["tokio-runtime"], optional = true }

tokio   = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time"] }
anyhow  = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

[profile.release]
# panic strategy stays "unwind" (the Win7 build-std lane relies on this being
# pinned here, not on the build-std crate list — see release.yml win7 lane).
panic = "unwind"
strip = false   # release workflow strips per-target after build
