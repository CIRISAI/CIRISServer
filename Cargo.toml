[package]
name = "ciris-server"
version = "0.5.12"   # 0.1 = lens-only (agent ~2.9.7); 0.3 = +auth subsystem / one-wheel; 0.4 = +federation peering/identity (capacity scoring, consent:replication, register_federation_key gate, root-bootstrap, NodeCode); 0.4.1 = self-attested first-run root claim (#887); 0.4.2 = one-time claim PIN; 0.4.3 = CC-compliant ownership (infra:* responsible-party owner-binding, no agency, serve-only-until-owned); 0.4.4 = substrate-native user-signed owner-binding — 1-phase /v1/setup/root + the local node's /v1/setup/claim-remote (client is a node; crypto only in the substrate); 0.4.10 = Adapter seam (trait + AdapterContext + serve_with_adapter, mirrors CIRISAgent BaseAdapterProtocol — ciris-status = ciris-server + StatusAdapter); 0.4.11 = substrate floor edge v5.0.1 + persist v9.0.3 (wheel Requires-Dist metadata fix, #241/#242; Rust source unchanged); 0.4.12 = CEG-driven replication reconciler (consent objects are the topology; API writes CEG, runtime converges; runtime Initiator-add pending CIRISEdge#173); 0.4.13 = edge v5.1.0 runtime peer control → replication reconciler is fully no-restart (consent converges live; CIRISEdge#173 resolved); 0.4.14 = config-as-CEG foundation (config:v1 CEG schema + GraphConfig service + owner-gated /v1/config; 0.5 P1); 0.4.15 = config reconciler + migrated transport/scorer/replication-cadence/mode env→config:* (hot-applied; lens_store_min baked; 0.5 P2); 0.5 = config-as-CEG (graph config — ZERO env vars; ALL config is signed CEG objects, owner-authored, runtime-reconciled, replicated; the fabric IS the config); 0.5.1 = #27 fix — node key_id = fedcode::derive_key_id(label,pubkey) (FSD-003 label-fingerprint; keystore_alias stays raw, no re-key) + the WHEEL py_main now honors --home/--key-id (was run_default → bare label); cohort_scope consts; uuid helper; 0.5.2 = #32 fix — the wheel py_main reads Python sys.argv (not std::env::args, which under the console-script carried the interpreter+script path as a spurious positional → "unknown serve arg"); v0.5.1 wheel was unusable; 0.5.3 = #34 fix — GET /v1/identity reports the derived wire key_id (was the keystore alias; now matches federation_keys + SignedKeyRecord); 0.5.4 = node-side device-authorization grant (RFC 8628; /v1/auth/device/{code,approve,token}) — owner-approves via fed-ID (YubiKey/TPM) self-login, issues a DELEGATED token attributed to the actor (agent) on behalf of the principal (owner); SessionCaller.actor; mirrors ciris-manager-client; 0.5.5 = first-run bootstrap unblocked — fed-ID mint (/v1/self/identity) + self-claim (/v1/setup/claim-remote) OPEN during first-run (no ROOT yet ⇒ no owner session to require; mirrors the agent's require_setup_mode), owner-gated again once claimed; setup/apex routes restricted to LOOPBACK peers (per-route guard; read API still binds 0.0.0.0); + GET /v1/setup/status (first-run signal, ends the client's 404 fast-degrade); + CEG-native node list GET /v1/setup/owned-nodes (projects delegates_to(user→node) owner-bindings via ownership::nodes_owned_by — the list IS the graph, not a client store); claim-remote user-signer resolved at REQUEST time (fed-ID is minted mid-wizard) keyed by a custody-backend marker so TPM/YubiKey/software re-open correctly; self-claim loopback fallback when a local NodeCode has no transport_hint; 0.5.6 = owner login password → device-grant approval prerequisite. The claim-minted ROOT had password_hash:None ⇒ no /v1/auth/login session ⇒ /v1/auth/device/approve was unreachable (the v0.5.4 grant shipped without its approval path). Now /v1/setup/root accepts optional owner_password (threaded through claim-remote on the loopback self-claim) and sets the ROOT cert's password_hash, so the owner gets a SYSTEM_ADMIN session via /v1/auth/login (username = wa_id) → approves the agent's device grant → the agent acts on-behalf (delegated dgrant: token, owner authority + actor attribution; cannot self-amplify). Wizard account password + friendly username now flow into the self-claim; login resolves wa_id | OAuth `<provider>:<external_id>` | human name (store::resolve_login, the fabric port of the agent's multi-key _users cache). 0.5.7 = WAs-need-fed-IDs UPGRADE path (the agent team's 2.9.7 migration). POST /v1/self/upgrade-owner (owner-session-gated + loopback) re-roots an already-owned node on a fed-ID: build_signed_owner_binding(fed-ID → node) + apply_signed_owner_binding (registers the fed-ID as a `user` identity + persists delegates_to(user→node, infra:*)) — the SAME CC 3.2 owner-binding the first-run claim uses, but authorized by the EXISTING owner's session (not first-run/PIN) and applied locally (no setup/root, existing ROOT + password/OAuth login PRESERVED; non-destructive owner-binding model). Client: NodeSwitcherViewModel.upgradeToFedId (mint fed-ID → upgrade) + a ManageNodes "Upgrade this account to a Fed ID" affordance. So an existing password/OAuth-rooted WA becomes fed-ID-rooted; is_owner_bound(node) then resolves to the fed-ID + the node enters the CEG owned-nodes list. 0.5.8 = age-assurance is CEG-native + correctly sequenced. POST /v1/self/age (loopback + owner-session) records the bound owner's self-declared age as a hybrid-SIGNED federation attestation (subject signs with their fed-ID via ownership::emit_signed_attestation — the working put_attestation path; NOT the unsigned local-upsert+attestation_promote path, which is broken on real nodes by CIRISPersist#247 where promote writes scrub_key_id=signer.current_alias() not the derived key_id). Wizard now posts age AFTER the claim (owner fed-ID must exist to sign), not at band-select (which 401'd — the federation /v1/safety/age-assurance route needs an x-ciris sig the app can't produce): claimLocalNodeOwnership → owner login → set age. Filed CIRISPersist#247 (promote alias-FK bug) + #248 (Engine::emit_attestation DX helper). 0.5.9 = Delegations surface — owner lists/approves/revokes who may act on-behalf. GET /v1/auth/device/grants (list LIVE delegated grants) + POST /v1/auth/device/revoke {client_id}, owner-session-gated; over the in-memory device-grant registry (thin — the substrate-native delegation surface / CIRISPersist#104 lands later). Client: a "Delegations" card in the Manage nav group (active list + approve-by-user_code + per-row revoke). The UI for the device-code flow: agent generates a code → owner approves here → agent gets the attributed dgrant token. 0.5.10 = CIRISServer#38 — adopt the CEWP scope-native-privacy substrate triple: verify v6.3.0 + persist v9.2.0 + edge v6.1.0 (from 6.2.0/9.0.3/5.1.0). CC 1.13.3.4 anonymity-by-default below federation, ratified end-to-end (CIRISConformance#19). Pins bumped in the root + the in-tree ciris-lens-core workspace member (both, else dual-version E0308); builds + clippy + tests + runtime (boot→mint→claim→owned) all green with ZERO source changes — the edge/persist surface (PublishOutcome, crypto_tier, scope blobs) is additive. Remaining #38 items (operator dual-statement UX, archive_mode group-creation, cohort_scope audit, docs, bench) are client/docs follow-ups. 0.5.11 = CIRISServer#38 follow-ups (server/docs, unblocked): tools/audit_cohort_scope_callers.py (FSD §3.2 default-flip review aid — lists federation-scope CEG emit sites for explicit operator review; --strict gate) + docs/SCOPE_PRIVACY.md (CC 1.13.3.3 dual-statement operator guide: default anonymity-by-default-below-federation + the GPA residual needing ANONYMOUS_TIER; archive_mode; deployment guidance). The verify-6.6 accord adoption (#41) + the remaining #38 client items (dual-statement on client surfaces, archive_mode group-creation) wait on edge 6.2.0 + persist 9.3.0 (verify-6.6 pin would dual-version against edge 6.1.0/persist 9.2.0). 0.5.12 = CIRISServer#45 — adopt the ciris-persist v9.3.0 CEG-native graph DX surface (+ the substrate cascade). SUBSTRATE: persist v9.2.0→v9.3.0 + edge v6.1.0→v6.2.0 + verify family v6.3.0→v6.6.0. The verify bump is FORCED lockstep, not a choice: persist v9.3.0 transitively pins ciris-verify-core v6.6.0, so the whole verify family (verify-core/keyring/crypto) must ride v6.6.0 or cargo resolves two ciris_verify_core crates with incompatible ThresholdMember/keyring types (6.4.0/6.4.1/6.5.0/6.6.0 are HUMANITY_ACCORD + STH-stack work, orthogonal to this cascade). Pins bumped in BOTH the root + the in-tree ciris-lens-core workspace member. The pin bump surfaced (and #45 fixes) the #247 promote-FK reality: persist v9.3.0's attestation_promote now writes scrub_key_id = engine.local_derived_key_id() = derive_key_id(<alias>,<pubkey>) (the DERIVED wire key_id, never the bare alias) — so a node MUST be registered under its derived id for the promote FK to resolve (prod already does via compose::register_self_key; the safety-test fixture register_node_self was registering the literal NODE_KEY_ID → now registers engine.local_derived_key_id(), mirroring prod). COLLAPSE (Cut B, traversal): is_owner_bound + nodes_owned_by drop their hand-rolled inbound-edge walks (list_attestations_for/by + lookup_public_key + a local delegation_revoked) and consume Engine::owner_bindings_of — the purpose-built reader that folds edge-expiry + the §11.10 withdraws/recants edge-retraction in; the read-time CC 1.13.5 infra-only re-check is dropped as REDUNDANT (persist's CC 4.4.3.4.3 node-agency gate already enforces infra:* at WRITE time). nodes_owned_by reads the recipient from attested_key_id (persist's canonical field) not envelope[node_key_id], so it is correct under either envelope shape; delegation_revoked deleted (~95 LOC net). e2e reachability tests (tests/safety.rs §6) prove owner_bindings_of / owner_binding_chain / reachable_under_scope / active_{community,family}_members are wired through ciris-server's Engine for the consumers that fold on next (mirrors the edge v6.2.0 adoption's active_roster / delegation_reads proofs). KEPT hand-rolled (documented; mirrors the edge team's v6.2.0 keep-and-file discipline) + upstream gaps filed: (a) scorer.rs's capacity emit sets weight=Some(score) which persist trust_scoring/topology read via weight.unwrap_or(1.0) — #248 emit_attestation hard-codes weight:None, so collapsing would silently reweight every capacity row to 1.0 (filed CIRISPersist#252: add optional weight to EmitAttestationInput); (b) peer.rs/graph_config.rs node-self emits sign via engine.sign_hybrid on a with_hardware_signer_hybrid (TPM/SE-custodied) Engine, which exposes no LocalSigner to pass to emit_attestation/owner_bind (filed CIRISPersist#253: Engine::emit_attestation_self over the composed signer); (c) the #247 USER key_id derivation (identity.rs pins the user genesis to the literal <alias>-user; the emit_signed_attestation/emit_owner_binding user-path collapse + the derived-id flip both depend on it) is wire-changing + custody-sensitive: create_federation_identity couples the ML-DSA seal-id == the recorded key_id, so recording the derived id while keeping the seal under the stable keystore alias (no re-open/lockout migration) needs a verify-side split — filed CIRISVerify#89, with a back-compat-shim migration plan for already-claimed nodes. 0.6 = +registry (~2.9.8/9); 1.0 = +node (~2.9.10). Patch forward on breakage.
edition = "2021"
# MSRV floor is set by the substrate: ciris-verify v5.2.0 requires 1.86
# (persist v6.0.1 is 1.83). Build with the higher of the two.
rust-version = "1.86"
authors = ["Eric Moore <eric@ciris.ai>"]
description = "The fabric node — the federation's headless cohabitation runtime (registry + lens [+ node] over one shared substrate). agent = fabric node + brain. Shipped as both the ciris-server binary and a PyO3 abi3 wheel CIRISAgent consumes. See MISSION.md."
license = "AGPL-3.0-or-later"
repository = "https://github.com/CIRISAI/CIRISServer"
readme = "README.md"
publish = false

# CIRISServer is ONE cohabitation composition in TWO shapes (MISSION.md §1.2/§6):
#   - [lib] cdylib  → the PyO3 abi3 wheel CIRISAgent pip-installs (the agent is
#                     pure Python; it consumes ciris-server, not the cores).
#   - [lib] rlib    → so the ciris-server binary links the same composition.
#   - [[bin]]       → the headless fabric node deployment.
# The composition lives in src/lib.rs; src/main.rs is a thin entry point.
[workspace]
# lens-core is absorbed in-tree (CIRISLensCore repo retired); the root package
# composes it as a path dep. node-core folds in here the same way at Server 1.0.
members = ["crates/ciris-lens-core"]
resolver = "2"

[lib]
name = "ciris_server"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "ciris-server"
path = "src/main.rs"

[features]
default = []
# `python` pulls the PyO3 bindings (for the wheel). The binary builds WITHOUT it,
# so a plain `cargo build` never links libpython.
# ONE-WHEEL RE-EXPORT (CIRISServer#4): `python` ALSO turns on the substrate
# crates' OWN pyo3 surfaces (`ciris-persist/pyo3`, `ciris-edge/pyo3`) so their
# `#[pyclass]`es compile into THIS cdylib — one `.so`, one PyO3 type registry,
# so the persist `Engine` handed to edge is the SAME type both sides see (the
# CIRISPersist#109 cross-wheel type-identity bug CANNOT occur). persist names its
# feature `pyo3` (not `python`); edge likewise, and edge's `pyo3` already pulls
# `ciris-persist/pyo3` transitively — both listed for explicitness. verify is
# deliberately ABSENT: it is a ctypes wheel (libciris_verify_ffi.so via
# ctypes.CDLL), not a `#[pymodule]`, so it cannot be a pyo3 submodule.
python = [
    "dep:pyo3",
    "dep:pyo3-async-runtimes",
    "ciris-lens-core/python",
    "ciris-persist/pyo3",
    "ciris-edge/pyo3",
]
# `extension-module` is what maturin builds the wheel with (tells PyO3 not to
# link libpython). The bin must NOT enable it. See pyproject.toml [tool.maturin].
# Propagated to the substrate crates so THEIR pyo3 surfaces also skip linking
# libpython (each crate gates `extension-module` as its own feature).
extension-module = [
    "python",
    "pyo3/extension-module",
    "ciris-persist/extension-module",
    "ciris-edge/extension-module",
]
# `pkcs11` turns on the YubiKey (PKCS#11 / PIV) custody backend for the USER
# federation identity (`ciris-server identity create --backend pkcs11`). OFF by
# default: a plain `cargo build` never links `cryptoki`, and the Pkcs11 backend
# honestly returns NotSupported without it. It flips `ciris-keyring/pkcs11` on
# (operator hardware; Linux). The YubiKey path is hardware-validated by the
# operator — there is no token in CI, so it is gated + flagged, not unit-tested.
# Like the per-target `tpm` posture, it is NOT in `default`; build it explicitly
# (`--features pkcs11`) on a Linux box with a token attached.
pkcs11 = ["ciris-keyring/pkcs11"]
# NOTE: hardware key custody (TPM/SE/StrongBox) is wired per-TARGET below, not as
# a cargo feature — TPM (tss-esapi) is Linux-only, so a top-level `tpm` feature
# made `--all-features` drag tss-esapi onto Windows/macOS (where it can't build).
# The `[target.'cfg(target_os = "linux")']` table enables keyring/tpm + persist
# postgres on Linux only; runtime auto-detects hardware and degrades to encrypted
# software when absent (`is_hardware_backed()` reports the posture). This mirrors
# the substrate crates' per-target keyring/postgres gating.

# ----------------------------------------------------------------------------
# Dependencies — CIRISServer AUTHORS NO PRIMITIVES. It composes the core
# libraries over ONE shared persist Engine (registry + lens read/write the same
# corpus in-process; per-slice views via Engine::from_shared).
#
# Substrate floor (SHIPPED): persist v8.6.0 / edge v4.5.0 / verify-family v5.11.0
# (ciris-keyring + ciris-crypto + ciris-verify-core), CEG 1.0-RC12. The composition
# root pins the singleton construction; the in-tree ciris-lens-core co-bumps in
# lockstep (MAJOR caret pins persist "8" / edge "4"). edge v4.2.0 ships the relay
# outer-open primitive (`open_av_outer`, CIRISEdge#149) → multi-tier ALM chains
# (benches/alm_chain.rs). All additive; no composition-root API change. pyo3 0.29.
# ----------------------------------------------------------------------------
[dependencies]
# The composed cores (authority + observation; node folds in at Server 1.0).
# ciris-registry-core — re-added at Server 0.5, co-bumped to the 6.6/edge-3.2 floor
# (CIRISRegistry#76). Held OUT of the 0.1 graph: registry-core@main still pins the
# OLD floor (persist 5.5.5 / edge 2.2.2 / verify 5.1.3) and would drag a second
# persist+edge rev into the build. The compose_registry() scaffold stays in
# src/compose.rs; this dep returns once registry co-bumps.
ciris-lens-core     = { path = "crates/ciris-lens-core" } # ABSORBED in-tree (workspace member); CIRISLensCore repo retired
# ciris-node-core   — folds in at Server 1.0 / agent 2.9.10 (a substrate gen behind: persist 4.10).

# The substrate trio (also pulled transitively by the cores; pinned here so the
# composition root owns the singleton construction).
# sqlite on all platforms; postgres is Linux-only (libpq/openssl don't link
# cleanly on the macOS/Windows runners — same posture as persist's own CI). The
# `[target.linux]` table below adds postgres.
# `cirislens_wa_cert` + `cirislens_service_token_revocation` expose the auth
# substrate the fabric absorbs (CIRISServer#9, src/auth): the agent's `wa_cert`
# table (users/WA/OAuth/api-keys) + the `revoked_service_tokens` table.
ciris-persist     = { git = "https://github.com/CIRISAI/CIRISPersist", tag = "v9.3.0", features = ["sqlite", "cirislens_wa_cert", "cirislens_service_token_revocation"] }
ciris-edge        = { git = "https://github.com/CIRISAI/CIRISEdge", tag = "v6.2.0", features = ["transport-reticulum", "transport-http"] }
# Founder-quorum verification + key-id fingerprint at the composition root
# (threshold:: module path — NOT re-exported at the crate root).
# LOCKSTEP: persist v9.3.0 transitively pins verify-core v6.6.0 — the whole
# verify family (verify-core/keyring/crypto) MUST ride v6.6.0 or cargo resolves
# two ciris_verify_core crates with incompatible ThresholdMember/keyring types.
# (6.4.0/6.4.1/6.5.0/6.6.0 are HUMANITY_ACCORD + STH stack, orthogonal to this
# cascade — we ride 6.6.0 only because the cross-cdylib lockstep forces it.)
ciris-verify-core = { git = "https://github.com/CIRISAI/CIRISVerify", tag = "v6.6.0" }
# Hardware-backed transport-identity keystore (verify v5.2.0 #68 / edge #99).
# Base = software keystore + byte-identical migration of an existing .rid (works
# everywhere, no libtss2). The real TPM-2.0 / SE / StrongBox backend rides the
# `tpm` feature; runtime auto-detects hardware and falls back to software.
ciris-keyring = { git = "https://github.com/CIRISAI/CIRISVerify", tag = "v6.6.0", version = "6", features = ["software", "pqc-ml-dsa"] }

# PyO3 bindings for the abi3 wheel — optional, gated behind the `python` feature
# so the binary never links them. 0.29 matches the persist/edge family floor.
pyo3                = { version = "0.29", features = ["abi3-py310"], optional = true }
pyo3-async-runtimes = { version = "0.29", features = ["tokio-runtime"], optional = true }

tokio   = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "sync"] }
anyhow  = "1"
fs2       = "0.4"   # available-disk check for realistic-minimum feature gating
# GET /v1/identity (the fabric-node identity surface) — merged onto the lens
# read-API listener. axum pinned to lens-core's 0.8 so the merged Router unifies.
axum       = "0.8"
base64     = "0.22"
serde      = { version = "1", features = ["derive"] } # holonomic scoreboard model (benchmarks::)
serde_json = "1"
getrandom  = "0.3"   # mint the ML-DSA-65 federation seed on first boot (hybrid PQC)
# Cosmetic v4 attestation-ids (the content hash is the integrity anchor). Direct
# dep at the same major persist already pins transitively — no new resolution.
uuid       = { version = "1", features = ["v4"] }
# Auth subsystem (src/auth, CIRISServer#9): timestamps on the absorbed wa_cert
# rows, SHA-256 for api-key / service-token hashing, hex for the digest wire form.
# All three already in the lock as substrate-transitive deps (no new resolution).
chrono     = { version = "0.4", features = ["serde"] }
sha2       = "0.10"
hex        = "0.4"
# Auth gap-close (CIRISServer#9, src/auth): the byte-compatible password KDF +
# the OAuth/native/device-auth outbound-HTTP + JWKS-verify halves. All already in
# the lock as substrate-transitive deps (reqwest/jsonwebtoken via edge+verify;
# pbkdf2/hmac/ed25519-dalek via the crypto family) — pinned here so the auth
# subsystem owns them directly, no new resolution.
# - pbkdf2 + hmac: reproduce the agent's PBKDF2-HMAC-SHA256(100k) password hash
#   (auth_service.py `_hash_password`/`_verify_password`) byte-for-byte.
# - ed25519-dalek: verify the ROOT mint signature (the agent's `verify_root_signature`).
# - jsonwebtoken: Apple Sign-In RS256 JWKS verification.
# - reqwest (rustls): Google tokeninfo / OAuth code→token / Apple JWKS / Portal HTTP.
# - urlencoding: build the provider authorize-URL query string (matches urlencode).
pbkdf2     = { version = "0.12", default-features = false }
hmac       = "0.12"
subtle     = "2"     # constant-time password-hash compare (the agent's hmac.compare_digest)
ed25519-dalek = "2"
jsonwebtoken  = "9"
urlencoding   = "2"
async-trait   = "0.1"  # the ProviderClient HTTP seam (async fn in trait)
reqwest    = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
flate2     = "1"     # read the gz'd legacy-trace dump (import-traces subcommand)
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Linux-only hardware + Postgres: cargo UNIONS these onto the base deps above.
# - persist `postgres` (libpq/openssl) — Linux deployment + the postgres
#   conformance lane; macOS/Windows stay sqlite-only.
# - keyring `tpm` (tss-esapi / TPM 2.0) — the real hardware backend; needs
#   libtss2 (Linux build dep). Other targets keep the software keystore.
[target.'cfg(target_os = "linux")'.dependencies]
ciris-persist = { git = "https://github.com/CIRISAI/CIRISPersist", tag = "v9.3.0", features = ["postgres", "cirislens_wa_cert", "cirislens_service_token_revocation"] }
ciris-keyring = { git = "https://github.com/CIRISAI/CIRISVerify", tag = "v6.6.0", version = "6", features = ["tpm"] }

# Android (arm64/arm32/x86_64): the keyring `android` backend (JNI → Android
# Keystore/StrongBox); sqlite bundles, no postgres/tpm. Mirrors persist/edge.
[target.'cfg(target_os = "android")'.dependencies]
ciris-keyring = { git = "https://github.com/CIRISAI/CIRISVerify", tag = "v6.6.0", version = "6", features = ["android"] }

# Test-only — the two-node replication integration test (tests/replication.rs)
# builds + signs CEG batches with the same primitives persist verifies against.
# ed25519-dalek MUST match persist's locked 2.x (the SigningKey type crosses the
# Engine::with_signer / put_public_key API boundary).
[dev-dependencies]
ed25519-dalek = "2"
base64        = "0.22"
chrono        = { version = "0.4", features = ["serde"] }
serde_json    = "1"
criterion     = { version = "0.5", features = ["async_tokio"] }
# Drive the merged axum Router in-process for the HTTP trace-ingest test
# (tests/ingest_http.rs): `ServiceExt::oneshot` + read the response body. tower
# 0.5 / http-body-util 0.1 match axum 0.8's floor (already in-tree transitively).
tower            = { version = "0.5", features = ["util"] }
http-body-util   = "0.1"
# The PQC primitives the realtime-A/V E2E bench drives directly: hybrid KEX
# (X25519 + ML-KEM-768) for the per-Link transit key, AES-256-GCM for the
# two-layer chunk seal. Same pin/features edge composes (tag parity).
ciris-crypto  = { git = "https://github.com/CIRISAI/CIRISVerify", tag = "v6.6.0", version = "6", features = ["hybrid-kex", "aes-gcm", "pqc-ml-dsa"] }
# Enable edge's OWN fountain codec (`codec-fountain`, L1-A) for the survival-floor
# proof — dev/test ONLY (feature unification applies to test/bench builds; the
# shipped wheel stays codec-free, since a relay forwards sealed symbols opaquely
# and never encodes/decodes). This lets tests/chaos_mesh.rs exercise the SUBSTRATE
# codec (`fountain_encode`/`fountain_decode`) directly — a real MEASURED proof,
# not a reference stand-in.
ciris-edge    = { git = "https://github.com/CIRISAI/CIRISEdge", tag = "v6.2.0", features = ["codec-fountain"] }

# PQC realtime-A/V streaming E2E benchmark (CIRISEdge#62 realtime_av profile).
[[bench]]
name = "pqc_av_streaming"
harness = false

# Replication / corpus-ingest throughput (the CEG-RC5 receive spine).
[[bench]]
name = "replication_ingest"
harness = false

# Multi-tier ALM relay chain (CIRISEdge#149 open_av_outer) — per-hop + per-depth
# cost; the E2E byte-survival invariant is gated in tests/alm_chain.rs.
[[bench]]
name = "alm_chain"
harness = false

# Sustained multi-stream seal throughput — measures the actual core-fraction to
# seal N blob streams @30fps in a real loop (promotes the page's "2,000 blob
# streams ≈ 6-10% of a core" from arithmetic to MEASURED).
[[bench]]
name = "stream_fanout"
