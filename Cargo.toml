version = "0.5.40" # 0.5.40 = enable the persist `cirisaudit` feature so the audit-chain WRITE surface (audit_record_entry + audit_canonicalize_for_hash/_for_signing, #[cfg(cirisaudit)] PyEngine methods) compiles into the wheel and re-exports to the agent — unblocks CIRISAgent#896 Phase 0 audit migration (CIRISServer#83); the methods were feature-gated off, never removed; # 0.5.39 = one-wheel re-export COMPLETE — register_persist/register_edge now delegate to the crates' pub fn register (persist v10 #231 reset_engine + edge v7.0.2 #199 init_edge_runtime, restoring the hook that regressed in the v7.x line); the agent re-hosts the FULL persist+edge surface from the single ciris-server wheel and drops its standalone ciris_persist/ciris_edge wheels;   # 0.1 = lens-only (agent ~2.9.7); 0.3 = +auth subsystem / one-wheel; 0.4 = +federation peering/identity (capacity scoring, consent:replication, register_federation_key gate, root-bootstrap, NodeCode); 0.4.1 = self-attested first-run root claim (#887); 0.4.2 = one-time claim PIN; 0.4.3 = CC-compliant ownership (infra:* responsible-party owner-binding, no agency, serve-only-until-owned); 0.4.4 = substrate-native user-signed owner-binding — 1-phase /v1/setup/root + the local node's /v1/setup/claim-remote (client is a node; crypto only in the substrate); 0.4.10 = Adapter seam (trait + AdapterContext + serve_with_adapter, mirrors CIRISAgent BaseAdapterProtocol — ciris-status = ciris-server + StatusAdapter); 0.4.11 = substrate floor edge v5.0.1 + persist v9.0.3 (wheel Requires-Dist metadata fix, #241/#242; Rust source unchanged); 0.4.12 = CEG-driven replication reconciler (consent objects are the topology; API writes CEG, runtime converges; runtime Initiator-add pending CIRISEdge#173); 0.4.13 = edge v5.1.0 runtime peer control → replication reconciler is fully no-restart (consent converges live; CIRISEdge#173 resolved); 0.4.14 = config-as-CEG foundation (config:v1 CEG schema + GraphConfig service + owner-gated /v1/config; 0.5 P1); 0.4.15 = config reconciler + migrated transport/scorer/replication-cadence/mode env→config:* (hot-applied; lens_store_min baked; 0.5 P2); 0.5 = config-as-CEG (graph config — ZERO env vars; ALL config is signed CEG objects, owner-authored, runtime-reconciled, replicated; the fabric IS the config); 0.5.1 = #27 fix — node key_id = fedcode::derive_key_id(label,pubkey) (FSD-003 label-fingerprint; keystore_alias stays raw, no re-key) + the WHEEL py_main now honors --home/--key-id (was run_default → bare label); cohort_scope consts; uuid helper; 0.5.2 = #32 fix — the wheel py_main reads Python sys.argv (not std::env::args, which under the console-script carried the interpreter+script path as a spurious positional → "unknown serve arg"); v0.5.1 wheel was unusable; 0.5.3 = #34 fix — GET /v1/identity reports the derived wire key_id (was the keystore alias; now matches federation_keys + SignedKeyRecord); 0.5.4 = node-side device-authorization grant (RFC 8628; /v1/auth/device/{code,approve,token}) — owner-approves via fed-ID (YubiKey/TPM) self-login, issues a DELEGATED token attributed to the actor (agent) on behalf of the principal (owner); SessionCaller.actor; mirrors ciris-manager-client; 0.5.5 = first-run bootstrap unblocked — fed-ID mint (/v1/self/identity) + self-claim (/v1/setup/claim-remote) OPEN during first-run (no ROOT yet ⇒ no owner session to require; mirrors the agent's require_setup_mode), owner-gated again once claimed; setup/apex routes restricted to LOOPBACK peers (per-route guard; read API still binds 0.0.0.0); + GET /v1/setup/status (first-run signal, ends the client's 404 fast-degrade); + CEG-native node list GET /v1/setup/owned-nodes (projects delegates_to(user→node) owner-bindings via ownership::nodes_owned_by — the list IS the graph, not a client store); claim-remote user-signer resolved at REQUEST time (fed-ID is minted mid-wizard) keyed by a custody-backend marker so TPM/YubiKey/software re-open correctly; self-claim loopback fallback when a local NodeCode has no transport_hint; 0.5.6 = owner login password → device-grant approval prerequisite. The claim-minted ROOT had password_hash:None ⇒ no /v1/auth/login session ⇒ /v1/auth/device/approve was unreachable (the v0.5.4 grant shipped without its approval path). Now /v1/setup/root accepts optional owner_password (threaded through claim-remote on the loopback self-claim) and sets the ROOT cert's password_hash, so the owner gets a SYSTEM_ADMIN session via /v1/auth/login (username = wa_id) → approves the agent's device grant → the agent acts on-behalf (delegated dgrant: token, owner authority + actor attribution; cannot self-amplify). Wizard account password + friendly username now flow into the self-claim; login resolves wa_id | OAuth `<provider>:<external_id>` | human name (store::resolve_login, the fabric port of the agent's multi-key _users cache). 0.5.7 = WAs-need-fed-IDs UPGRADE path (the agent team's 2.9.7 migration). POST /v1/self/upgrade-owner (owner-session-gated + loopback) re-roots an already-owned node on a fed-ID: build_signed_owner_binding(fed-ID → node) + apply_signed_owner_binding (registers the fed-ID as a `user` identity + persists delegates_to(user→node, infra:*)) — the SAME CC 3.2 owner-binding the first-run claim uses, but authorized by the EXISTING owner's session (not first-run/PIN) and applied locally (no setup/root, existing ROOT + password/OAuth login PRESERVED; non-destructive owner-binding model). Client: NodeSwitcherViewModel.upgradeToFedId (mint fed-ID → upgrade) + a ManageNodes "Upgrade this account to a Fed ID" affordance. So an existing password/OAuth-rooted WA becomes fed-ID-rooted; is_owner_bound(node) then resolves to the fed-ID + the node enters the CEG owned-nodes list. 0.5.8 = age-assurance is CEG-native + correctly sequenced. POST /v1/self/age (loopback + owner-session) records the bound owner's self-declared age as a hybrid-SIGNED federation attestation (subject signs with their fed-ID via ownership::emit_signed_attestation — the working put_attestation path; NOT the unsigned local-upsert+attestation_promote path, which is broken on real nodes by CIRISPersist#247 where promote writes scrub_key_id=signer.current_alias() not the derived key_id). Wizard now posts age AFTER the claim (owner fed-ID must exist to sign), not at band-select (which 401'd — the federation /v1/safety/age-assurance route needs an x-ciris sig the app can't produce): claimLocalNodeOwnership → owner login → set age. Filed CIRISPersist#247 (promote alias-FK bug) + #248 (Engine::emit_attestation DX helper). 0.5.9 = Delegations surface — owner lists/approves/revokes who may act on-behalf. GET /v1/auth/device/grants (list LIVE delegated grants) + POST /v1/auth/device/revoke {client_id}, owner-session-gated; over the in-memory device-grant registry (thin — the substrate-native delegation surface / CIRISPersist#104 lands later). Client: a "Delegations" card in the Manage nav group (active list + approve-by-user_code + per-row revoke). The UI for the device-code flow: agent generates a code → owner approves here → agent gets the attributed dgrant token. 0.5.10 = CIRISServer#38 — adopt the CEWP scope-native-privacy substrate triple: verify v6.3.0 + persist v9.2.0 + edge v6.1.0 (from 6.2.0/9.0.3/5.1.0). CC 1.13.3.4 anonymity-by-default below federation, ratified end-to-end (CIRISConformance#19). Pins bumped in the root + the in-tree ciris-lens-core workspace member (both, else dual-version E0308); builds + clippy + tests + runtime (boot→mint→claim→owned) all green with ZERO source changes — the edge/persist surface (PublishOutcome, crypto_tier, scope blobs) is additive. Remaining #38 items (operator dual-statement UX, archive_mode group-creation, cohort_scope audit, docs, bench) are client/docs follow-ups. 0.5.11 = CIRISServer#38 follow-ups (server/docs, unblocked): tools/audit_cohort_scope_callers.py (FSD §3.2 default-flip review aid — lists federation-scope CEG emit sites for explicit operator review; --strict gate) + docs/SCOPE_PRIVACY.md (CC 1.13.3.3 dual-statement operator guide: default anonymity-by-default-below-federation + the GPA residual needing ANONYMOUS_TIER; archive_mode; deployment guidance). The verify-6.6 accord adoption (#41) + the remaining #38 client items (dual-statement on client surfaces, archive_mode group-creation) wait on edge 6.2.0 + persist 9.3.0 (verify-6.6 pin would dual-version against edge 6.1.0/persist 9.2.0). 0.5.12 = CIRISServer#45 — adopt the ciris-persist v9.3.0 CEG-native graph DX surface (+ the substrate cascade). SUBSTRATE: persist v9.2.0→v9.3.0 + edge v6.1.0→v6.2.0 + verify family v6.3.0→v6.6.0. The verify bump is FORCED lockstep, not a choice: persist v9.3.0 transitively pins ciris-verify-core v6.6.0, so the whole verify family (verify-core/keyring/crypto) must ride v6.6.0 or cargo resolves two ciris_verify_core crates with incompatible ThresholdMember/keyring types (6.4.0/6.4.1/6.5.0/6.6.0 are HUMANITY_ACCORD + STH-stack work, orthogonal to this cascade). Pins bumped in BOTH the root + the in-tree ciris-lens-core workspace member. The pin bump surfaced (and #45 fixes) the #247 promote-FK reality: persist v9.3.0's attestation_promote now writes scrub_key_id = engine.local_derived_key_id() = derive_key_id(<alias>,<pubkey>) (the DERIVED wire key_id, never the bare alias) — so a node MUST be registered under its derived id for the promote FK to resolve (prod already does via compose::register_self_key; the safety-test fixture register_node_self was registering the literal NODE_KEY_ID → now registers engine.local_derived_key_id(), mirroring prod). COLLAPSE (Cut B, traversal): is_owner_bound + nodes_owned_by drop their hand-rolled inbound-edge walks (list_attestations_for/by + lookup_public_key + a local delegation_revoked) and consume Engine::owner_bindings_of — the purpose-built reader that folds edge-expiry + the §11.10 withdraws/recants edge-retraction in; the read-time CC 1.13.5 infra-only re-check is dropped as REDUNDANT (persist's CC 4.4.3.4.3 node-agency gate already enforces infra:* at WRITE time). nodes_owned_by reads the recipient from attested_key_id (persist's canonical field) not envelope[node_key_id], so it is correct under either envelope shape; delegation_revoked deleted (~95 LOC net). e2e reachability tests (tests/safety.rs §6) prove owner_bindings_of / owner_binding_chain / reachable_under_scope / active_{community,family}_members are wired through ciris-server's Engine for the consumers that fold on next (mirrors the edge v6.2.0 adoption's active_roster / delegation_reads proofs). KEPT hand-rolled (documented; mirrors the edge team's v6.2.0 keep-and-file discipline) + upstream gaps filed: (a) scorer.rs's capacity emit sets weight=Some(score) which persist trust_scoring/topology read via weight.unwrap_or(1.0) — #248 emit_attestation hard-codes weight:None, so collapsing would silently reweight every capacity row to 1.0 (filed CIRISPersist#252: add optional weight to EmitAttestationInput); (b) peer.rs/graph_config.rs node-self emits sign via engine.sign_hybrid on a with_hardware_signer_hybrid (TPM/SE-custodied) Engine, which exposes no LocalSigner to pass to emit_attestation/owner_bind (filed CIRISPersist#253: Engine::emit_attestation_self over the composed signer); (c) the #247 USER key_id derivation (identity.rs pins the user genesis to the literal <alias>-user; the emit_signed_attestation/emit_owner_binding user-path collapse + the derived-id flip both depend on it) is wire-changing + custody-sensitive: create_federation_identity couples the ML-DSA seal-id == the recorded key_id, so recording the derived id while keeping the seal under the stable keystore alias (no re-open/lockout migration) needs a verify-side split — filed CIRISVerify#89, with a back-compat-shim migration plan for already-claimed nodes. 0.5.13 = device-code act-on-behalf is CEG-native (unblocked by the 0.5.12 substrate). The RFC-8628 handshake (device_code↔user_code, pending/approved/denied) stays in-memory (ephemeral protocol state), but the AUTHORIZATION is now a durable, signed, revocable delegates_to(owner → actor) CEG attestation. On POST /v1/auth/device/approve the node resolves the LOCAL owner's federation signer (resolve_user_signer) and emits delegates_to(owner → actor, [owner:act-on-behalf]) via ownership::emit_signed_attestation — for a hardware-backed owner ID (YubiKey/TPM/SE) the sign_hybrid BLOCKS on insert+touch, so that physical presence IS the consent. (Emit uses the working user-signed path attester=signer.key_id()=the REGISTERED literal — NOT persist's grant_delegation, which derives attester=signer.derived_key_id() and would FK-fail until the deferred #247 user-key migration / CIRISVerify#89.) The minted dgrant: bearer is only an ephemeral session credential — resolve_bearer re-checks reachable_under_scope on EVERY use, so an owner's withdraws kills the bearer immediately (not just at TTL). GET /v1/auth/device/grants lists the LIVE delegates_to edges (the list IS the graph); POST /v1/auth/device/revoke emits a signed withdraws (hardware touch) + drops the bearer. The actor (client_id) MUST be a registered federation identity (the edge attested_key_id FK + the CC 4.4.3.4.3 node-agency gate needs a non-node identity_type for the act-on-behalf scope) → invalid_client otherwise. DeviceGrantState gained owner_key_id + seed_dir (mirrors ClaimRemoteState; compose passes <keystore_alias>-user + user_seed_dir). tests/device_grant.rs rewritten end-to-end (mint owner on disk → approve emits → reachable → token bearer → revoke withdraws → reachable false → bearer dead + list empty; unregistered-actor → invalid_client; RFC-8628 mechanics preserved). 0.5.14 = the FINAL 0.5.x substrate/identity-complete cut (Track A — the cut the agent adopts for 2.9.7 lens-core replacement). SUBSTRATE: persist v9.3.0→v9.4.0 + edge v6.2.1 + verify family v6.6.0→v6.6.1. persist v9.4.0 ships the two emit surfaces filed during the v9.3.0 adoption (CIRISPersist#252 EmitAttestationInput.weight + #253 Engine::emit_attestation_self); verify v6.6.1 (CIRISVerify#89) adds create_federation_identity's seal_alias arg (the #247 user-key-derived enabler). This closes CIRISServer#45 in full. EMIT COLLAPSE: scorer.rs / peer.rs / graph_config.rs node-self emits drop the hand-rolled canonicalize→hash→hybrid-sign→assemble→put recipe for Engine::emit_attestation_self (signs with the engine's OWN composed hardware-hybrid signer; attester/scrub = the node's #247 derived key_id == cfg.key_id — wire-preserving); scorer keeps weight=Some(score) via EmitAttestationInput.weight so the capacity band survives onto the row (trust_scoring reads weight.unwrap_or(1.0)). #247 USER-KEY: identity.rs mint_user_identity now RECORDS the user under the FSD-003 derived key_id derive_key_id(<alias>,<ed_pub>) (same scheme as the node) while passing seal_alias=<alias> so create_federation_identity seals the ML-DSA half + the Ed25519 seed under the stable keystore alias — re-open by alias reproduces it (NO custody migration / NO lockout). hardware_user_local_signer builds the user LocalSigner with key_id = the derived id (opening blobs by the alias), so EVERY downstream signer.key_id() (owner-binding attester, age subject, device-grant owner id) is the correct registered wire id with no other call-site changes. device_grant list/revoke fixed to scan the graph under the owner's derived id (resolve the signer → key_id(), not the alias) — surfaced + fixed by this migration. TEST FIXTURES: every node-self-emit fixture now registers under engine.local_derived_key_id() + threads the derived id (capacity_scorer/config_reconcile/federation_admin/graph_config/peer_replication/replication_reconcile/device_grant); identity unit tests assert the derived-id roundtrip. Full suite green (20/20), clippy + fmt clean. NOTE: the user's wire/federation key_id changes from the literal <alias>-user to the derived <alias>-user-<fp> — fresh mints are clean; an already-claimed pre-0.5.14 node would re-emit its owner-binding under the derived id on re-claim (pre-1.0, the KEY itself is not re-keyed thanks to seal_alias). 0.5.15 = CIRISServer#41 PART 1 — the HUMANITY_ACCORD server surface (the SAFE-MESH FLOOR). New src/accord.rs: (1) POST /v1/accord/holder (owner-gated) admits a holder's self-signed accord_holder SignedKeyRecord through the canonical register_federation_key gate — which ENFORCES hardware attestation_evidence (persist refuses SoftwareOnly: a software-custodied holder cannot wield the kill-switch); (2) GET /v1/accord-holders, the cold-start recognition roster (list_keys_by_identity_type, no TOFU); (3) POST /v1/accord/verify-invocation, the AUTHORITATIVE server-side 2-of-3 verification of a HUMANITY_ACCORD invocation (verify_invocation over the registered holder set + InvocationDedup anti-replay) — the operational kill-switch (CC 4.2.1 / §9.2.1). Consumes verify v6.6.x humanity_accord/threshold + persist v9.4.0 accord_holder rows. tests/accord.rs: register 3 hardware-attested holders → roster → 2/3 verifies, 1/3 fails (quorum), replay rejected (dedup); missing-attestation holder REFUSED (custody floor); non-owner register 401/403. STILL PENDING (the rest of #41, gated): the portable high-secure key mode (FIPS YubiKey + USB-held ML-DSA, both-keys+PIN+touch) the accord keys MUST be held under — filed CIRISVerify#91 — plus the guided multi-party genesis ceremony + family-mgmt UX. WHY 0.5.X HOLDS: cutting 0.6 (+registry) bakes CANONICAL_BOOTSTRAP_PEERS + bootstraps the canonical mesh; that MUST NOT happen before the accord kill-switch is enforceable AND its keys are under genuine 2-factor distributed-human custody (#91). So the project stays on 0.5.X (patch-forward) until the safe-mesh floor is complete. 0.5.16 = substrate floor bump to persist v9.4.1 + edge v6.2.2 + verify family v6.7.1 (the safe-mesh-floor verify deps land). persist 9.4.0→9.4.1 (verify-family re-pin, no persist code change) + edge 6.2.1→6.2.2 (lockstep) + verify 6.6.1→6.7.1 (ADDITIVE accord stack). v6.7.1 ships exactly what the rest of CIRISServer#41 was gated on: ciris-keyring usb_wrapped_mldsa65 + hw_token (resolve_hardware_class / FIPS classes) = the PORTABLE HIGH-SECURE KEY MODE (resolves CIRISVerify#91 — FIPS YubiKey + USB-held ML-DSA, both-keys+PIN+touch); accord_custody_attestation (produce/verify_accord_custody_attestation, verify_yubikey_piv_attestation) = the holder custody attestation that FEEDS the attestation_evidence the v0.5.15 accord-holder gate already enforces; and accord_genesis (produce_accord_holder_record, build_accord_family_envelope, co_sign/assemble_accord_family_genesis, build/co_sign/concur_accord_invocation, accord_invocation_status) = the multi-party genesis ceremony + invocation-concurrence producer. Pins bumped in root + ciris-lens-core; single-version resolve; additive (zero source changes, full suite green). NOT CONSUMED YET — the consuming PRs (portable-key-mode holder provisioning + custody attestation; the genesis ceremony orchestration; the invocation-concurrence flow + client UI) follow on this foundation. Still on 0.5.X: the safe-mesh floor is now BUILDABLE end-to-end but not yet COMPLETE; no 0.6 (+registry / mesh bootstrap) until it is. 0.5.17 = CIRISServer#41 PART 2 — the accord GENESIS CEREMONY + invocation CONCURRENCE (consuming verify v6.7.1 accord_genesis). src/accord.rs adds: POST /v1/accord/genesis/envelope (build the canonical accord_family envelope holders co-sign) + POST /v1/accord/genesis/assemble (owner-gated; assemble_accord_family_genesis runs the 2-of-3 distinct-founder quorum fail-closed, then durably RECORDS the verified accord_family_genesis as a node-authored CEG attestation — the accord family is FOUNDER-signed with no family keypair, so it is NOT stored in federation_families whose family_key_id FKs to federation_keys; the signed genesis object IS the record) + GET /v1/accord/family (projects the entrenched quorum:2/3 family). Invocation concurrence: POST /v1/accord/invocation (open a pending invocation with the initiator cosignature) + POST /v1/accord/invocation/concur (append a concurring holder cosignature, advancing toward 2/3) + GET /v1/accord/invocations (pending + advisory status; verify-invocation stays authoritative against federation_keys). tests/accord.rs (5): the holder-registry/kill-switch trio + genesis_ceremony_assembles_and_entrenches_the_family (3 holders → envelope → 2/3 co-sign → assemble+record → GET family shows 3 entrenched) + invocation_concurrence_advances_to_quorum (1/3 sub-quorum → concur → 2/3 met → listed). REMAINING #41: the holder-device portable-custody provisioning tool (UsbWrappedMlDsa65Signer + produce_accord_custody_attestation; real YubiKey token open blocked on CIRISVerify#62 get_token_signer stub) + the KMP ceremony/concurrence client UI (built in parallel, integrating). Still 0.5.X until the safe-mesh floor is COMPLETE. 0.5.18 = CIRISServer#41 PART 3 — the portable high-secure accord-holder PROVISIONING tool (src/accord_custody.rs), consuming verify v6.7.1 CIRISVerify#91 (resolved). provision_portable_holder wires UsbWrappedMlDsa65Signer::provision (ML-DSA-65 AEAD-wrapped to a USB key, unwrappable only by the YubiKey via touch+PIN) + HardwareRootedIdentity (Ed25519 in a FIPS YubiKey + the wrapped ML-DSA) + produce_accord_holder_record (the self-signed accord_holder record to register via POST /v1/accord/holder) + produce_accord_custody_attestation (the portable_2fa FIPS PIV-chain custody proof). HOLDER-DEVICE op (a library fn, not a server endpoint): the caller supplies the YubiKey Ed25519 HardwareSigner — real FIPS YubiKey token open is blocked on CIRISVerify#62 (get_token_signer stubbed NotSupported), so the wiring is exercised today with a software Ed25519 stand-in + lands on real hardware once #62 ships. Test: provision → re-open the USB-wrapped ML-DSA roundtrips (software stand-in). With this, the safe-mesh-floor SERVER surface is complete: holder registry + 2/3 kill-switch (0.5.15) + genesis ceremony + concurrence (0.5.17) + portable-custody provisioning (this) + the KMP Accord client UI. Remaining before 0.6: CIRISVerify#62 (real YubiKey token), the operational genesis CEREMONY run, then bake CANONICAL_BOOTSTRAP_PEERS. 0.5.19 = CIRISServer#41 — the accord-holder CUSTODY GATE wired (the SAFE-MESH FLOOR pin). POST /v1/accord/holder accepts an optional custody_attestation (the holder portable_2fa YubiKey PIV chain 9c→f9→…intermediates…→Yubico Attestation Root 1) and verifies it via verify_accord_custody_attestation against the PINNED DURABLE ROOT — Yubico Attestation Root 1 (developers.yubico.com/PKI/yubico-ca-1.pem, embedded src/accord_pki/yubico_attestation_root_1.der) — plus the FIPS-certified+touch-always floor + attested-key==holder bind, BEFORE admitting. Pin the DURABLE root, NOT the rotating "Yubico PIV Attestation B 1"; f9+intermediates ride in the holder attestation chain. CIRISVerify#91+#62 closed+validated on a real YubiKey 5 FIPS (fw 5.7.4; ciris_keyring::pkcs11 cryptoki live). test: non-chaining custody refused before registration. REMAINING for the floor: the foolproof holder-provisioning UI (accord_custody::provision_portable_holder; select ML-DSA USB path on an already-FIPS-approved key) + the operational genesis ceremony RUN. Still 0.5.X. 0.5.20 = CIRISServer#41 — the OPERATIONAL HALT (the kill-switch made ENFORCEABLE, not just verifiable; CC 4.2.1/4.2.3/§9.2.1). NEW POST /v1/accord/message: a node receiving an authentic accord-holder-signed message (1) replicates it to all known peers (concurrence-seeking gossip, loop-stopped by a seen-set); (2) for a verified 2-of-3 CONSTITUTIONAL quorum (the global halt) replicates to ALL peers FIRST, then latches a disk halt (src/accord_halt.rs writes HUMANITY_ACCORD_HALT under home) and terminates the process fail-secure (exit 42); (3) notify/drill flow the SAME replicate+surface path but NEVER halt (EAS-style drill of the delivery path). create_invocation/concur share the replicate+halt path so a concurring cosignature reaching 2/3